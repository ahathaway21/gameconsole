<div id="hud">
  <div class="hud-block">

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div id="row-warning"></div>
  <div id="overlay">
    <h1>COSMIC SNOOD</h1>
    <div class="subtitle">BUBBLE BLASTER</div>
    <p>Aim and shoot critters to match<br>3 or more of the same color!<br><br>Clear <em>every bubble</em> to complete a level.<br>The drop timer adds a new row<br>if you take too long.</p>
    <button class="ov-btn" id="start-btn">LAUNCH</button>
  </div>
</div>

<script>
'use strict';

// ================================================================
//  WEB AUDIO ENGINE
// ================================================================
const SFX = (() => {
  let ac = null;
  let muted = false;
  function ctx() {
    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === 'suspended') ac.resume();
    return ac;
  }
  function osc(freq, type, dur, vol, t0, freqEnd) {
    if (muted) return;
    try {
      const c = ctx(), o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = type;
      o.frequency.setValueAtTime(freq, t0 || c.currentTime);
      if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, (t0 || c.currentTime) + dur);
      g.gain.setValueAtTime(vol, t0 || c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, (t0 || c.currentTime) + dur);
      o.start(t0 || c.currentTime);
      o.stop((t0 || c.currentTime) + dur);
    } catch(e) {}
  }
  function burst(dur, vol) {
    if (muted) return;
    try {
      const c = ctx(), len = Math.floor(c.sampleRate * dur);
      const buf = c.createBuffer(1, len, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource(), g = c.createGain();
      src.buffer = buf; src.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(vol, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      src.start(); src.stop(c.currentTime + dur);
    } catch(e) {}
  }
  return {
    shoot()   { osc(420, 'square',   0.07, 0.11, null, 220); },
    land()    { osc(200, 'sine',     0.07, 0.09); },
    pop(n)    {
      const f = 440 + n * 28;
      osc(f, 'sine', 0.2, 0.14);
      osc(f * 1.26, 'sine', 0.15, 0.09);
      if (n >= 5) osc(f * 1.5, 'sine', 0.12, 0.07);
    },
    orphan()  { osc(300, 'triangle', 0.22, 0.11, null, 140); },
    combo(n)  { osc(580 + n * 55, 'square', 0.12, 0.12); },
    rowDrop() { burst(0.22, 0.16); osc(120, 'sawtooth', 0.30, 0.18, null, 75); },
    warn()    { osc(460, 'square', 0.055, 0.07); },
    levelUp() {
      [523,659,784,1046].forEach((f,i) => {
        const t = ctx().currentTime + i * 0.1;
        osc(f, 'sine', 0.18, 0.14, t);
      });
    },
    gameOver() {
      [440,330,220,165].forEach((f,i) => {
        const t = ctx().currentTime + i * 0.18;
        osc(f, 'sawtooth', 0.28, 0.18, t);
      });
    },
    pause()  { osc(520, 'square', 0.05, 0.06); },
    resume() { osc(620, 'square', 0.05, 0.06); },
    toggleMute(){ muted=!muted; return muted; },
    isMuted(){ return muted; },
  };
})();

// ================================================================
//  CONSTANTS & GLOBALS
// ================================================================
const canvas     = document.getElementById('canvas');
const ctx2d      = canvas.getContext('2d');
const timerBar   = document.getElementById('timer-bar');
const timerNum   = document.getElementById('timer-num');
const rowWarning = document.getElementById('row-warning');

const COLS     = 9;
const SQ3      = Math.sqrt(3);
// Cross-browser rounded rect (roundRect not available on all mobile WebViews)
function rrect(x,y,w,h,r){
  ctx2d.beginPath();
  ctx2d.moveTo(x+r,y);
  ctx2d.lineTo(x+w-r,y); ctx2d.arcTo(x+w,y,x+w,y+r,r);
  ctx2d.lineTo(x+w,y+h-r); ctx2d.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx2d.lineTo(x+r,y+h); ctx2d.arcTo(x,y+h,x,y+h-r,r);
  ctx2d.lineTo(x,y+r); ctx2d.arcTo(x,y,x+r,y,r);
  ctx2d.closePath();
}

// Timer constants
const BASE_DROP_MS  = 60000;  // 60s starting interval
const DROP_DECAY_MS = 10000;  // -10s each row drop
const MIN_DROP_MS   = 30000;  // floor: 30s
const WARN_MS       = 15000;  // warning beep threshold

// Palette: [fill, glow]
const PAL = [
  ['#ff3b44','#ff0011'],
  ['#2d8bff','#0044ff'],
  ['#00dc6a','#00aa44'],
  ['#ffdd00','#ffaa00'],
  ['#cb55ff','#9900ff'],
  ['#ff8c1a','#ff5500'],
];

let W, H, R, TOTAL_ROWS;
let game    = null;
let paused  = false;
let lastTS  = 0;

// ---- Grid helpers -----------------------------------------------
const gcols = r  => r % 2 === 0 ? COLS : COLS - 1;
const bx    = (c, r) => R + c * 2 * R + (r % 2 ? R : 0);
const by    = r  => R + r * R * SQ3;

function neighbors(r, c, maxR) {
  const o = r % 2 === 1;
  return [
    [r-1, o?c:c-1],[r-1, o?c+1:c],
    [r,   c-1],    [r,   c+1],
    [r+1, o?c:c-1],[r+1, o?c+1:c],
  ].filter(([nr,nc]) => nr>=0 && nr<maxR && nc>=0 && nc<gcols(nr));
}

// ---- Resize -------------------------------------------------------
function resize() {
  const hudH = document.getElementById('hud').offsetHeight || 50;
  W = Math.min(window.innerWidth, 480);
  H = Math.min(window.innerHeight - hudH, 720);
  canvas.width  = W;
  canvas.height = H;
  R = Math.floor(W / 18);
  TOTAL_ROWS = Math.floor((H - R * 5) / (R * SQ3));
}

// ---- Stars --------------------------------------------------------
const STARS = Array.from({length:130}, () => ({
  x: Math.random()*480, y: Math.random()*720,
  r: Math.random()*1.4+0.3, phase: Math.random()*Math.PI*2,
}));
function drawStars() {
  const now = Date.now() * 0.0008;
  ctx2d.save();
  STARS.forEach(s => {
    const b = 0.35 + 0.65*(0.5+0.5*Math.sin(now+s.phase));
    ctx2d.globalAlpha = b;
    ctx2d.fillStyle = '#fff';
    ctx2d.beginPath(); ctx2d.arc(s.x%W, s.y%H, s.r, 0, Math.PI*2); ctx2d.fill();
  });
  ctx2d.globalAlpha = 1; ctx2d.restore();
}

// ---- Draw bubble --------------------------------------------------
function drawBubble(x, y, ci, alpha=1, scale=1) {
  if (alpha <= 0) return;
  const [fill, glow] = PAL[ci];
  ctx2d.save();
  ctx2d.globalAlpha = alpha;
  ctx2d.translate(x, y); ctx2d.scale(scale, scale);
  ctx2d.shadowColor = glow; ctx2d.shadowBlur = R * 0.9;
  const gr = ctx2d.createRadialGradient(-R*.25,-R*.28,R*.05, 0,0,R*.92);
  gr.addColorStop(0,'#fff'); gr.addColorStop(.25,fill); gr.addColorStop(1,glow);
  ctx2d.beginPath(); ctx2d.arc(0,0,R*.88,0,Math.PI*2); ctx2d.fillStyle=gr; ctx2d.fill();
  ctx2d.shadowBlur = 0;
  ctx2d.beginPath(); ctx2d.arc(-R*.22,-R*.28,R*.22,0,Math.PI*2);
  ctx2d.fillStyle='rgba(255,255,255,0.32)'; ctx2d.fill();
  const ey=-R*.12, ex=R*.22;
  ctx2d.fillStyle='rgba(0,0,0,0.75)';
  ctx2d.beginPath(); ctx2d.arc(-ex,ey,R*.13,0,Math.PI*2); ctx2d.fill();
  ctx2d.beginPath(); ctx2d.arc( ex,ey,R*.13,0,Math.PI*2); ctx2d.fill();
  ctx2d.fillStyle='rgba(255,255,255,0.9)';
  ctx2d.beginPath(); ctx2d.arc(-ex+R*.04,ey-R*.04,R*.05,0,Math.PI*2); ctx2d.fill();
  ctx2d.beginPath(); ctx2d.arc( ex+R*.04,ey-R*.04,R*.05,0,Math.PI*2); ctx2d.fill();
  ctx2d.strokeStyle='rgba(0,0,0,0.55)'; ctx2d.lineWidth=Math.max(1.2,R*.08);
  ctx2d.beginPath(); ctx2d.arc(0,R*.18,R*.25,.18,Math.PI-.18); ctx2d.stroke();
  ctx2d.restore();
}

// ---- FX classes ---------------------------------------------------
class Particle {
  constructor(x,y,color){
    this.x=x;this.y=y;this.c=color;
    this.vx=(Math.random()-.5)*R*.6; this.vy=(Math.random()-.8)*R*.55;
    this.life=1; this.r=R*(.08+Math.random()*.14);
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=.22;this.life-=.038;}
  draw(){
    ctx2d.save();ctx2d.globalAlpha=Math.max(0,this.life);
    ctx2d.fillStyle=this.c;ctx2d.shadowColor=this.c;ctx2d.shadowBlur=6;
    ctx2d.beginPath();ctx2d.arc(this.x,this.y,this.r,0,Math.PI*2);ctx2d.fill();
    ctx2d.restore();
  }
}
class Faller {
  constructor(x,y,ci){
    this.x=x;this.y=y;this.ci=ci;
    this.vx=(Math.random()-.5)*R*.18; this.vy=-R*.07; this.life=1;
  }
  update(){this.vy+=.35;this.x+=this.vx;this.y+=this.vy;this.life-=.018;if(this.y>H+R*3)this.life=0;}
  draw(){drawBubble(this.x,this.y,this.ci,Math.max(0,this.life)*.85,.88);}
}
class Flash {
  constructor(text,color){this.text=text;this.color=color;this.life=1;this.y=H*.42;}
  update(){this.life-=.025;this.y-=.6;}
  draw(){
    if(this.life<=0)return;
    ctx2d.save();ctx2d.globalAlpha=Math.min(1,this.life*2);
    ctx2d.font=`900 ${Math.floor(R*1.1)}px Orbitron,monospace`;
    ctx2d.fillStyle=this.color;ctx2d.shadowColor=this.color;ctx2d.shadowBlur=20;
    ctx2d.textAlign='center';ctx2d.fillText(this.text,W/2,this.y);
    ctx2d.restore();
  }
}

// ---- Row drop animation -------------------------------------------
class RowDropAnim {
  constructor(rowData){ this.row=rowData; this.t=0; this.done=false; }
  update(){ this.t=Math.min(1,this.t+.065); if(this.t>=1) this.done=true; }
  draw(){
    const ease = this.t<.5 ? 2*this.t*this.t : -1+(4-2*this.t)*this.t;
    const targetY = by(0), startY = -R*2.5;
    for(let c=0;c<this.row.length;c++){
      if(this.row[c]===null) continue;
      drawBubble(bx(c,0), startY+(targetY-startY)*ease, this.row[c], ease*.95, .93);
    }
  }
}

// ================================================================
//  GAME CLASS
// ================================================================
class Game {
  constructor(){
    this.grid=[]; this.score=0; this.level=1;
    this.combo=0;
    this.particles=[]; this.fallers=[]; this.flashes=[]; this.dropAnim=null;
    this.proj=null; this.angle=-Math.PI/2;
    this.shootColor=this.rndColor(); this.nextColor=this.rndColor();
    this.shooting=false; this.over=false; this.shake=0;
    this.levelTransition=false;
    this.transitionMs=0;
    this.levelClearBonus=0;

    // Drop timer
    this.dropMs       = 0;
    this.dropFull     = 0;
    this.dropInterval = 0;  // current per-drop duration, shrinks 10s each trigger
    this.warnDone     = false;

    this.initLevel();   // also calls resetTimer()
    this.updateHUD();
  }

  rndColor(){
    // Used only for filling the grid — full unlocked palette
    const maxC = Math.min(3 + Math.floor(this.level / 10), PAL.length);
    return Math.floor(Math.random() * maxC);
  }

  // Returns a Set of color indices currently present on the grid
  gridColors(){
    const s = new Set();
    for(let r=0;r<TOTAL_ROWS;r++)
      for(let c=0;c<gcols(r);c++)
        if(this.grid[r]&&this.grid[r][c]!=null) s.add(this.grid[r][c]);
    return s;
  }

  // Pick a random color from those currently on the grid.
  // Falls back to rndColor() if grid is empty (level transition, etc.)
  liveColor(){
    const live = [...this.gridColors()];
    if(live.length===0) return this.rndColor();
    return live[Math.floor(Math.random()*live.length)];
  }

  // First row index whose Y is at or below the game-over line
  getDangerRow(){
    for(let r=0;r<TOTAL_ROWS;r++) if(by(r)>=H-R*4.5) return r;
    return TOTAL_ROWS;
  }

  // Starting drop interval for this level (ms)
  computeStartMs(){
    const maxSafe = Math.max(1, this.getDangerRow()-2);
    const target  = 3 + Math.floor(this.level/10);
    const atMax   = target >= maxSafe;
    if(!atMax) return BASE_DROP_MS;
    // At max fill: reduce 15s per 5 levels, floor 30s
    const cut = Math.floor(this.level/5) * 15000;
    return Math.max(MIN_DROP_MS, BASE_DROP_MS - cut);
  }

  initLevel(){
    this.combo=0;
    this.grid=[];
    for(let r=0;r<TOTAL_ROWS;r++) this.grid.push(new Array(gcols(r)).fill(null));
    // Fill rows: 3 base + 1 per 10 levels, never within 2 of danger line
    const maxSafe  = Math.max(1, this.getDangerRow()-2);
    const target   = 3 + Math.floor(this.level/10);
    const fillRows = Math.min(target, maxSafe);
    for(let r=0;r<fillRows;r++)
      for(let c=0;c<gcols(r);c++){
        if(r>0&&Math.random()<.12) continue;
        this.grid[r][c]=this.rndColor();
      }
    this.resetTimer();
    this.shootColor = this.liveColor();
    this.nextColor  = this.liveColor();
  }

  resetTimer(){
    this.dropInterval = this.computeStartMs();
    this.dropMs       = this.dropInterval;
    this.dropFull     = this.dropInterval;
    this.warnDone     = false;
    this.updateTimerUI(1);
  }

  isGridClear(){
    for(let r=0;r<TOTAL_ROWS;r++)
      for(let c=0;c<gcols(r);c++)
        if(this.grid[r]&&this.grid[r][c]!=null) return false;
    return true;
  }

  // ---------- Timer -----------------------------------------------
  tickTimer(dt){
    if(this.over||this.dropAnim||this.levelTransition) return;
    this.dropMs -= dt;
    const frac = Math.max(0, this.dropMs/this.dropFull);
    this.updateTimerUI(frac);
    if(this.dropMs<=WARN_MS && !this.warnDone){ this.warnDone=true; SFX.warn(); }
    if(this.dropMs<=0){ this.warnDone=false; this.addRow(); }
  }

  updateTimerUI(frac){
    const totalSec = Math.max(0, Math.ceil(this.dropMs/1000));
    const mm = Math.floor(totalSec/60), ss = totalSec%60;
    timerNum.textContent = mm>0 ? `${mm}:${String(ss).padStart(2,'0')}` : `${ss}s`;
    timerBar.style.width = (frac*100)+'%';
    if(frac>.5)       timerBar.style.background='linear-gradient(90deg,#00d4ff,#0066ff)';
    else if(frac>.25) timerBar.style.background='linear-gradient(90deg,#ffcc00,#ff7700)';
    else              timerBar.style.background='linear-gradient(90deg,#ff4400,#ff0000)';
    rowWarning.style.opacity = frac<.08 ? String(.35+.65*(1-frac/.08)) : '0';
  }

  addRow(){
    if(this.levelTransition||this.over) return;
    SFX.rowDrop();
    this.shake=9;
    // Ensure grid length matches TOTAL_ROWS
    while(this.grid.length<TOTAL_ROWS) this.grid.push(new Array(gcols(this.grid.length)).fill(null));
    while(this.grid.length>TOTAL_ROWS) this.grid.pop();
    const lastR=this.grid[TOTAL_ROWS-1];
    if(!lastR||lastR.some(c=>c!=null)){ this.triggerOver(); return; }
    const newRow=Array.from({length:gcols(0)},()=>this.rndColor());
    this.grid.pop();
    this.grid.unshift(newRow);
    // After unshift every row's parity flips. Pad any row that is now too
    // short so grid[r][c] is always null (never undefined) for c < gcols(r).
    for(let r=0;r<this.grid.length;r++){
      const need=gcols(r);
      while(this.grid[r].length<need) this.grid[r].push(null);
    }
    this.dropAnim=new RowDropAnim(newRow);
    this.flashes.push(new Flash('INCOMING!','#ff6600'));
    // Decay the interval by 10s each drop, floor at 30s; reset countdown to new value
    this.dropInterval = Math.max(MIN_DROP_MS, this.dropInterval - DROP_DECAY_MS);
    this.dropMs   = this.dropInterval;
    this.dropFull = this.dropInterval;
    this.warnDone = false;
    this.updateTimerUI(1);
    this.checkGameOver();
    this.updateHUD();
  }

  // ---------- Shoot -----------------------------------------------
  setAngle(cx,cy){
    const rect=canvas.getBoundingClientRect();
    const sx=W/2, sy=H-R*2.2;
    let a=Math.atan2((cy-rect.top)*(H/rect.height)-sy,(cx-rect.left)*(W/rect.width)-sx);
    this.angle=Math.max(-Math.PI+.12,Math.min(-.12,a));
  }

  shoot(){
    if(this.shooting||this.over||this.proj||this.dropAnim||this.levelTransition) return;
    SFX.shoot();
    const sp=R*1.1;
    this.proj={x:W/2,y:H-R*2.2,vx:Math.cos(this.angle)*sp,vy:Math.sin(this.angle)*sp,ci:this.shootColor,trail:[]};
    this.shootColor=this.nextColor; this.nextColor=this.liveColor(); this.shooting=true;
  }

  updateProj(){
    if(!this.proj) return;
    const p=this.proj;
    p.trail.push({x:p.x,y:p.y}); if(p.trail.length>10) p.trail.shift();
    for(let s=0;s<10;s++){
      p.x+=p.vx/10; p.y+=p.vy/10;
      if(p.x-R*.88<0)  {p.x=R*.88;   p.vx= Math.abs(p.vx);}
      if(p.x+R*.88>W)  {p.x=W-R*.88; p.vx=-Math.abs(p.vx);}
      if(p.y-R*.88<=0) {p.y=R*.88; this.place(p); return;}
      let hit=false;
      for(let r=0;r<TOTAL_ROWS&&!hit;r++)
        for(let c=0;c<gcols(r)&&!hit;c++){
          if(!this.grid[r]||this.grid[r][c]==null) continue;
          const dx=p.x-bx(c,r),dy=p.y-by(r);
          if(dx*dx+dy*dy<(R*1.72)*(R*1.72)){
            // Hitting a bubble that's at/below the danger line → instant game over
            if(by(r)>=H-R*4.5){ this.proj=null; this.shooting=false; this.triggerOver(); return; }
            this.place(p); hit=true;
          }
        }
      if(hit) return;
    }
    if(p.y>H+R*3){this.proj=null;this.shooting=false;}
  }

  place(p){
    if(this.levelTransition||this.over){ this.proj=null; this.shooting=false; return; }
    const seen=new Set(),cands=[];
    const add=(r,c)=>{const k=`${r},${c}`;if(!seen.has(k)){seen.add(k);cands.push([r,c]);}};
    for(let c=0;c<gcols(0);c++) if(this.grid[0]&&this.grid[0][c]==null) add(0,c);
    for(let r=0;r<TOTAL_ROWS;r++)
      for(let c=0;c<gcols(r);c++){
        if(!this.grid[r]||this.grid[r][c]==null) continue;
        neighbors(r,c,TOTAL_ROWS).forEach(([nr,nc])=>{if(this.grid[nr]&&this.grid[nr][nc]==null)add(nr,nc);});
      }
    let best=null,bestD=Infinity;
    cands.forEach(([r,c])=>{const d=(p.x-bx(c,r))**2+(p.y-by(r))**2;if(d<bestD){bestD=d;best=[r,c];}});
    // If no slot found, or the nearest slot is unreasonably far (teleport bug), end the game
    if(!best||bestD>(R*2.5)*(R*2.5)){this.proj=null;this.shooting=false;this.triggerOver();return;}
    const [pr,pc]=best;
    this.grid[pr][pc]=p.ci; this.proj=null;
    SFX.land();
    // If the bubble landed at or below the danger line → instant game over
    if(by(pr) >= H - R * 4.5){ this.triggerOver(); return; }
    for(let i=0;i<5;i++) this.particles.push(new Particle(bx(pc,pr),by(pr),PAL[p.ci][1]));
    const matched=this.flood(pr,pc,p.ci);
    if(matched.length>=3) this.pop(matched,p.ci);
    else {this.combo=0;this.checkGameOver();}
    this.shooting=false; this.updateHUD();
  }

  flood(sr,sc,ci){
    const vis=new Set(),q=[[sr,sc]],res=[];
    while(q.length){
      const [r,c]=q.shift(),k=`${r},${c}`;
      if(vis.has(k)) continue; vis.add(k);
      if(!this.grid[r]||this.grid[r][c]!=ci) continue;
      res.push([r,c]);
      neighbors(r,c,TOTAL_ROWS).forEach(([nr,nc])=>{if(!vis.has(`${nr},${nc}`)&&this.grid[nr]&&this.grid[nr][nc]==ci)q.push([nr,nc]);});
    }
    return res;
  }

  pop(cells,ci){
    this.combo++;
    this.score+=cells.length*10*this.combo;
    this.shake=6; SFX.pop(cells.length);
    cells.forEach(([r,c])=>{
      const x=bx(c,r),y=by(r);
      for(let i=0;i<12;i++) this.particles.push(new Particle(x,y,PAL[ci][1]));
      this.grid[r][c]=null;
    });
    if(this.combo>=3){SFX.combo(this.combo);this.flashes.push(new Flash(`COMBO ×${this.combo}!`,'#00d4ff'));}
    else if(cells.length>=6) this.flashes.push(new Flash(`MEGA! ×${cells.length}`,'#ffdd44'));
    const orp=this.findOrphans();
    if(orp.length){
      SFX.orphan();
      orp.forEach(([r,c])=>{
        this.fallers.push(new Faller(bx(c,r),by(r),this.grid[r][c]));
        this.grid[r][c]=null; this.score+=5*this.combo;
      });
      if(orp.length>=4) this.flashes.push(new Flash(`+${orp.length} FALLING!`,'#ff88ff'));
    }
    // Level complete when every bubble has been cleared
    if(this.isGridClear()){
      this.combo=0;
      const bonusPts = Math.floor((this.dropMs/1000)) * 5;
      this.score += bonusPts;
      this.level++;
      SFX.levelUp();
      this.levelTransition=true;
      this.transitionMs=1200;
      this.levelClearBonus=bonusPts;
    } else {
      this.checkGameOver();
    }
    this.updateHUD();
  }

  findOrphans(){
    const conn=new Set(),q=[];
    for(let c=0;c<gcols(0);c++) if(this.grid[0]&&this.grid[0][c]!=null){conn.add(`0,${c}`);q.push([0,c]);}
    while(q.length){
      const [r,c]=q.shift();
      neighbors(r,c,TOTAL_ROWS).forEach(([nr,nc])=>{
        const k=`${nr},${nc}`;if(!conn.has(k)&&this.grid[nr]&&this.grid[nr][nc]!=null){conn.add(k);q.push([nr,nc]);}
      });
    }
    const out=[];
    for(let r=0;r<TOTAL_ROWS;r++) for(let c=0;c<gcols(r);c++)
      if(this.grid[r]&&this.grid[r][c]!=null&&!conn.has(`${r},${c}`)) out.push([r,c]);
    return out;
  }

  checkGameOver(){
    const limit = H - R * 4.5; // just above shooter
    for(let r=0;r<TOTAL_ROWS;r++) for(let c=0;c<gcols(r);c++)
      if(this.grid[r]&&this.grid[r][c]!=null&&by(r)>=limit){this.triggerOver();return;}
  }

  loseLife(){ this.triggerOver(); }

  triggerOver(){
    if(this.over) return; this.over=true;
    SFX.gameOver();
    window.parent.postMessage({type:'GAME_OVER',score:this.score},'*');
    setTimeout(()=>{
      const ov=document.getElementById('overlay');
      ov.innerHTML=`
        <h1>GAME OVER</h1>
        <div class="subtitle">MISSION FAILED</div>
        <div class="final-score">${this.score.toLocaleString()}</div>
        <div class="final-label">FINAL SCORE · LEVEL ${this.level}</div>
        <button class="ov-btn" onclick="startGame()">TRY AGAIN</button>`;
      ov.classList.remove('hidden');
    },900);
  }

  updateHUD(){
    document.getElementById('score-val').textContent=this.score.toLocaleString();
    document.getElementById('level-val').textContent=this.level;
    let rem=0;
    for(let r=0;r<TOTAL_ROWS;r++) for(let c=0;c<gcols(r);c++)
      if(this.grid[r]&&this.grid[r][c]!=null) rem++;
    document.getElementById('left-val').textContent=rem||'—';
    const intSec = Math.round(this.dropInterval/1000);
    document.getElementById('timer-label').textContent=`⚠ DROP/${intSec}s`;
  }

  // ---------- Main update -----------------------------------------
  update(dt){
    if(this.over) return;
    // Level-transition cooldown (blocks timer & shooting after board clear)
    if(this.levelTransition){
      this.transitionMs-=dt;
      if(this.transitionMs<=0){ this.levelTransition=false; this.initLevel(); this.updateHUD(); }
      // Still animate particles/fallers/flashes during transition
      this.particles=this.particles.filter(p=>{p.update();return p.life>0;});
      this.fallers  =this.fallers.filter  (f=>{f.update();return f.life>0;});
      this.flashes  =this.flashes.filter  (f=>{f.update();return f.life>0;});
      if(this.shake>0) this.shake--;
      return;
    }
    this.updateProj();
    this.tickTimer(dt);
    this.particles=this.particles.filter(p=>{p.update();return p.life>0;});
    this.fallers  =this.fallers.filter  (f=>{f.update();return f.life>0;});
    this.flashes  =this.flashes.filter  (f=>{f.update();return f.life>0;});
    if(this.dropAnim){this.dropAnim.update();if(this.dropAnim.done)this.dropAnim=null;}
    if(this.shake>0) this.shake--;
  }

  // ---------- Draw ------------------------------------------------
  draw(){
    ctx2d.save();
    if(this.shake>0){
      const s=this.shake*1.2;
      ctx2d.translate((Math.random()-.5)*s,(Math.random()-.5)*s);
    }
    // BG
    const bg=ctx2d.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#020712');bg.addColorStop(1,'#0b0524');
    ctx2d.fillStyle=bg; ctx2d.fillRect(0,0,W,H);
    drawStars();
    // Nebulae
    [[W*.25,H*.25,W*.5,'rgba(30,10,80,0.18)'],[W*.8,H*.6,W*.45,'rgba(0,30,80,0.15)']].forEach(([nx,ny,nr,nc])=>{
      const nb=ctx2d.createRadialGradient(nx,ny,0,nx,ny,nr);
      nb.addColorStop(0,nc);nb.addColorStop(1,'transparent');
      ctx2d.fillStyle=nb;ctx2d.fillRect(0,0,W,H);
    });
    // Shooter-level danger line — faint always, pulses red when a bubble is near
    const shooterY = H - R * 4.5;
    let closestDist = Infinity;
    for(let r=0;r<TOTAL_ROWS;r++) for(let c=0;c<gcols(r);c++)
      if(this.grid[r]&&this.grid[r][c]!=null){
        const d = shooterY - by(r);
        if(d>0 && d<closestDist) closestDist=d;
      }
    const danger = Math.max(0, 1 - closestDist / (R*6)); // 0=safe 1=touching
    const pulse  = 0.5 + 0.5 * Math.sin(Date.now()*0.008);
    const lineAlpha = 0.12 + danger * 0.55 * pulse;
    ctx2d.save();
    ctx2d.strokeStyle = danger > 0.3
      ? `rgba(255,50,50,${lineAlpha})`
      : `rgba(255,255,255,${lineAlpha})`;
    ctx2d.setLineDash([6,8]); ctx2d.lineWidth = 1.5;
    ctx2d.beginPath(); ctx2d.moveTo(0,shooterY); ctx2d.lineTo(W,shooterY); ctx2d.stroke();
    ctx2d.setLineDash([]); ctx2d.restore();
    // Grid
    for(let r=0;r<TOTAL_ROWS;r++) for(let c=0;c<gcols(r);c++)
      if(this.grid[r]&&this.grid[r][c]!=null) drawBubble(bx(c,r),by(r),this.grid[r][c]);
    // Drop anim
    if(this.dropAnim) this.dropAnim.draw();
    // Aim + launcher — hidden during level transition
    if(!this.levelTransition){
      if(!this.shooting&&!this.proj&&!this.over&&!this.dropAnim) this.drawAim();
      // Projectile
      if(this.proj){
        const p=this.proj;
        p.trail.forEach((pt,i)=>{
          const a=(i/p.trail.length)*.5;
          ctx2d.save();ctx2d.globalAlpha=a;ctx2d.fillStyle=PAL[p.ci][1];
          ctx2d.shadowColor=PAL[p.ci][1];ctx2d.shadowBlur=4;
          ctx2d.beginPath();ctx2d.arc(pt.x,pt.y,R*.3*(i/p.trail.length),0,Math.PI*2);ctx2d.fill();
          ctx2d.restore();
        });
        drawBubble(p.x,p.y,p.ci);
      }
      this.drawLauncher();
    }

    this.particles.forEach(p=>p.draw());
    this.fallers.forEach(f=>f.draw());
    this.flashes.forEach(f=>f.draw());

    // Level-complete overlay
    if(this.levelTransition){
      const prog = 1 - (this.transitionMs/1200);
      const alpha = Math.min(1, prog*3);
      ctx2d.save();
      ctx2d.fillStyle=`rgba(2,7,18,${alpha*0.6})`;
      ctx2d.fillRect(0,0,W,H);
      // Pulsing ring
      const ring = prog * R * 14;
      ctx2d.strokeStyle=`rgba(68,255,153,${(1-prog)*0.6})`;
      ctx2d.lineWidth=3;
      ctx2d.beginPath();ctx2d.arc(W/2,H/2,ring,0,Math.PI*2);ctx2d.stroke();
      // Title
      ctx2d.globalAlpha=Math.min(1,alpha*2);
      ctx2d.font=`900 ${Math.floor(R*1.6)}px Orbitron,monospace`;
      ctx2d.textAlign='center';
      ctx2d.fillStyle='#44ff99';
      ctx2d.shadowColor='#44ff99'; ctx2d.shadowBlur=32;
      ctx2d.fillText('CLEARED!',W/2,H/2-R*.8);
      ctx2d.shadowBlur=0;
      // Level number
      ctx2d.font=`700 ${Math.floor(R*.75)}px Orbitron,monospace`;
      ctx2d.fillStyle='rgba(200,255,220,0.85)';
      ctx2d.fillText(`LEVEL ${this.level} STARTS NEXT`,W/2,H/2+R*.2);
      // Bonus
      if(this.levelClearBonus>0){
        ctx2d.font=`700 ${Math.floor(R*.65)}px Orbitron,monospace`;
        ctx2d.fillStyle='#ffdd44';
        ctx2d.shadowColor='#ffdd44'; ctx2d.shadowBlur=14;
        ctx2d.fillText(`TIME BONUS +${this.levelClearBonus.toLocaleString()}`,W/2,H/2+R*1.15);
        ctx2d.shadowBlur=0;
      }
      ctx2d.restore();
    }

    // Pause veil
    if(paused){
      ctx2d.fillStyle='rgba(2,7,18,0.72)';ctx2d.fillRect(0,0,W,H);
      ctx2d.font=`900 ${Math.floor(R*1.8)}px Orbitron,monospace`;
      ctx2d.textAlign='center';ctx2d.fillStyle='#00d4ff';
      ctx2d.shadowColor='#00d4ff';ctx2d.shadowBlur=28;
      ctx2d.fillText('PAUSED',W/2,H/2-R*.5);ctx2d.shadowBlur=0;
      ctx2d.font=`${Math.floor(R*.5)}px Orbitron,monospace`;
      ctx2d.fillStyle='rgba(100,200,255,0.5)';
      ctx2d.fillText('TAP ▶ TO RESUME',W/2,H/2+R);
    }
    ctx2d.restore();
  }

  drawAim(){
    let x=W/2,y=H-R*2.2,vx=Math.cos(this.angle),vy=Math.sin(this.angle);
    ctx2d.save();ctx2d.setLineDash([4,7]);ctx2d.strokeStyle='rgba(255,255,255,0.22)';ctx2d.lineWidth=1.5;
    ctx2d.beginPath();ctx2d.moveTo(x,y);
    for(let i=0;i<45;i++){
      x+=vx*R*.78;y+=vy*R*.78;
      if(x<R*.88){x=R*.88;vx=Math.abs(vx);}
      if(x>W-R*.88){x=W-R*.88;vx=-Math.abs(vx);}
      if(y<R) break;
      ctx2d.lineTo(x,y);
    }
    ctx2d.stroke();ctx2d.setLineDash([]);
    ctx2d.beginPath();ctx2d.arc(x,y,3,0,Math.PI*2);
    ctx2d.fillStyle='rgba(255,255,255,0.5)';ctx2d.fill();
    ctx2d.restore();
  }

  drawLauncher(){
    const sx=W/2,sy=H-R*2.2;
    const [fillC,glowC] = PAL[this.shootColor];

    // Platform base
    ctx2d.save();
    ctx2d.fillStyle='rgba(0,120,255,0.1)';ctx2d.strokeStyle='rgba(0,200,255,0.35)';ctx2d.lineWidth=1.5;
    rrect(sx-R*3,sy+R*.75,R*6,R*1.6,6);ctx2d.fill();ctx2d.stroke();
    ctx2d.restore();

    // Glowing color ring around baby head — shows current shoot color
    ctx2d.save();
    ctx2d.shadowColor=glowC; ctx2d.shadowBlur=R*1.2;
    ctx2d.strokeStyle=fillC; ctx2d.lineWidth=Math.max(2,R*.14);
    ctx2d.beginPath(); ctx2d.arc(sx,sy,R*.98,0,Math.PI*2); ctx2d.stroke();
    ctx2d.shadowBlur=0; ctx2d.restore();

    // Aim barrel
    ctx2d.save();
    ctx2d.strokeStyle='rgba(80,200,255,0.75)';ctx2d.lineWidth=Math.max(3,R*.15);
    ctx2d.lineCap='round';ctx2d.shadowColor='#00ccff';ctx2d.shadowBlur=10;
    ctx2d.beginPath();ctx2d.moveTo(sx,sy);
    ctx2d.lineTo(sx+Math.cos(this.angle)*R*1.6,sy+Math.sin(this.angle)*R*1.6);
    ctx2d.stroke();ctx2d.restore();

    // Creepy baby face
    drawBabyFace(sx, sy, R, this.angle);

    // FIRE label + current-color swatch (left side, mirrors NEXT on right)
    ctx2d.fillStyle='rgba(100,200,255,0.5)';
    ctx2d.font=`${Math.max(7,R*.38)}px Orbitron,monospace`;
    ctx2d.textAlign='center';
    ctx2d.fillText('FIRE', sx-R*2.9, sy+R*.25);
    drawBubble(sx-R*2.9, sy+R*1.05, this.shootColor, 1, .58);

    // NEXT label + preview bubble (right side)
    ctx2d.fillStyle='rgba(100,200,255,0.5)';
    ctx2d.fillText('NEXT',sx+R*2.9,sy+R*.25);
    drawBubble(sx+R*2.9,sy+R*1.05,this.nextColor,.9,.58);
  }
}

// ================================================================
//  CREEPY BABY FACE SHOOTER
// ================================================================
function drawBabyFace(x, y, r, angle) {
  ctx2d.save();
  ctx2d.translate(x, y);

  const now = Date.now();

  // Slight sway based on aim angle
  const tilt = angle * 0.18;
  ctx2d.rotate(tilt);

  // Head — pale, slightly sickly skin
  const headGr = ctx2d.createRadialGradient(-r*.2,-r*.25,r*.05, 0,0,r*.95);
  headGr.addColorStop(0,'#f5e8c8');
  headGr.addColorStop(0.6,'#d4b896');
  headGr.addColorStop(1,'#a07850');
  ctx2d.shadowColor='rgba(180,120,60,0.5)'; ctx2d.shadowBlur=r*.8;
  ctx2d.beginPath(); ctx2d.arc(0,0,r*.9,0,Math.PI*2);
  ctx2d.fillStyle=headGr; ctx2d.fill();
  ctx2d.shadowBlur=0;

  // Skull bumps / baby head shape — big forehead
  ctx2d.beginPath(); ctx2d.arc(0,-r*.55,r*.5,Math.PI,0);
  ctx2d.fillStyle='rgba(245,232,200,0.18)'; ctx2d.fill();

  // Veins — faint greenish lines on forehead
  ctx2d.strokeStyle='rgba(80,140,80,0.18)'; ctx2d.lineWidth=Math.max(1,r*.04);
  ctx2d.beginPath(); ctx2d.moveTo(-r*.3,-r*.55); ctx2d.quadraticCurveTo(-r*.15,-r*.2,-r*.25,-r*.1); ctx2d.stroke();
  ctx2d.beginPath(); ctx2d.moveTo( r*.2,-r*.5);  ctx2d.quadraticCurveTo( r*.1,-r*.25, r*.2,-r*.05); ctx2d.stroke();

  // — EYES —
  const blinkCycle = Math.sin(now * 0.0008);
  const eyeH = blinkCycle > 0.85 ? 0.5 : 1; // blink
  const eyeW = r * .17;
  const eyeY = -r * .14;
  const leftEX = -r*.28, rightEX = r*.28;

  // Eye whites
  ctx2d.fillStyle='rgba(230,220,200,0.95)';
  ctx2d.beginPath(); ctx2d.ellipse(leftEX,  eyeY, eyeW, eyeW*eyeH, 0, 0, Math.PI*2); ctx2d.fill();
  ctx2d.beginPath(); ctx2d.ellipse(rightEX, eyeY, eyeW, eyeW*eyeH, 0, 0, Math.PI*2); ctx2d.fill();

  if(eyeH > 0.5){
    // Pupils — slightly misaligned for creepiness
    ctx2d.fillStyle='#1a0a00';
    ctx2d.beginPath(); ctx2d.ellipse(leftEX-r*.02,  eyeY+r*.02, eyeW*.55, eyeW*.55*eyeH, 0, 0, Math.PI*2); ctx2d.fill();
    ctx2d.beginPath(); ctx2d.ellipse(rightEX+r*.03, eyeY-r*.01, eyeW*.55, eyeW*.55*eyeH, 0, 0, Math.PI*2); ctx2d.fill();

    // Irises — pale glassy
    ctx2d.fillStyle='rgba(160,200,160,0.6)';
    ctx2d.beginPath(); ctx2d.ellipse(leftEX-r*.02,  eyeY+r*.02, eyeW*.38, eyeW*.38*eyeH, 0, 0, Math.PI*2); ctx2d.fill();
    ctx2d.beginPath(); ctx2d.ellipse(rightEX+r*.03, eyeY-r*.01, eyeW*.38, eyeW*.38*eyeH, 0, 0, Math.PI*2); ctx2d.fill();

    // Catchlights — tiny, off-centre
    ctx2d.fillStyle='rgba(255,255,255,0.9)';
    ctx2d.beginPath(); ctx2d.arc(leftEX+r*.04,  eyeY-r*.06, r*.04, 0, Math.PI*2); ctx2d.fill();
    ctx2d.beginPath(); ctx2d.arc(rightEX+r*.06, eyeY-r*.05, r*.04, 0, Math.PI*2); ctx2d.fill();

    // Under-eye bags
    ctx2d.strokeStyle='rgba(120,80,50,0.25)'; ctx2d.lineWidth=Math.max(1,r*.04);
    ctx2d.beginPath(); ctx2d.arc(leftEX,  eyeY+eyeW*.5, eyeW*.7, 0.1, Math.PI-.1); ctx2d.stroke();
    ctx2d.beginPath(); ctx2d.arc(rightEX, eyeY+eyeW*.5, eyeW*.7, 0.1, Math.PI-.1); ctx2d.stroke();
  }

  // Eyebrows — furrowed inward
  ctx2d.strokeStyle='rgba(80,50,20,0.7)'; ctx2d.lineWidth=Math.max(1.5,r*.07); ctx2d.lineCap='round';
  ctx2d.beginPath(); ctx2d.moveTo(leftEX-r*.18, eyeY-r*.22); ctx2d.lineTo(leftEX+r*.1,  eyeY-r*.28); ctx2d.stroke();
  ctx2d.beginPath(); ctx2d.moveTo(rightEX+r*.18,eyeY-r*.22); ctx2d.lineTo(rightEX-r*.1, eyeY-r*.28); ctx2d.stroke();

  // Nose — tiny button
  ctx2d.fillStyle='rgba(160,100,60,0.4)';
  ctx2d.beginPath(); ctx2d.ellipse(0, r*.08, r*.08, r*.05, 0, 0, Math.PI*2); ctx2d.fill();
  ctx2d.fillStyle='rgba(80,40,20,0.35)';
  ctx2d.beginPath(); ctx2d.ellipse(-r*.055, r*.09, r*.035, r*.03, -0.3, 0, Math.PI*2); ctx2d.fill();
  ctx2d.beginPath(); ctx2d.ellipse( r*.055, r*.09, r*.035, r*.03,  0.3, 0, Math.PI*2); ctx2d.fill();

  // Mouth — unsettling wide open, showing teeth
  ctx2d.save();
  const mouthOpen = 0.42 + 0.08*Math.sin(now*0.0012); // breathes slightly
  ctx2d.beginPath();
  ctx2d.ellipse(0, r*.38, r*.32, r*mouthOpen, 0, 0, Math.PI*2);
  ctx2d.fillStyle='#1a0808'; ctx2d.fill();
  // Teeth — uneven
  ctx2d.fillStyle='rgba(220,215,200,0.92)';
  const tw=r*.09;
  for(let t=-1;t<=1;t++){
    const th = t===0 ? r*.13 : r*.10;
    const tx = t*r*.185;
    ctx2d.beginPath();
    ctx2d.rect(tx-tw*.5, r*.28, tw, th);
    ctx2d.fill();
  }
  // Bottom teeth — fewer, crooked
  ctx2d.fillStyle='rgba(200,195,178,0.75)';
  ctx2d.save(); ctx2d.translate(-r*.08, r*.48); ctx2d.rotate(0.1);
  ctx2d.beginPath(); ctx2d.rect(-tw*.45,0,tw*.9,r*.09); ctx2d.fill(); ctx2d.restore();
  ctx2d.save(); ctx2d.translate(r*.08, r*.46); ctx2d.rotate(-0.08);
  ctx2d.beginPath(); ctx2d.rect(-tw*.45,0,tw*.9,r*.09); ctx2d.fill(); ctx2d.restore();
  // Saliva string — thin droopy line
  ctx2d.strokeStyle='rgba(180,220,255,0.35)'; ctx2d.lineWidth=Math.max(1,r*.025);
  ctx2d.beginPath(); ctx2d.moveTo(r*.04,r*.38+r*.04); ctx2d.quadraticCurveTo(r*.06,r*.55,r*.03,r*.65); ctx2d.stroke();
  ctx2d.restore();

  // Chubby cheek blush
  ctx2d.fillStyle='rgba(220,100,80,0.12)';
  ctx2d.beginPath(); ctx2d.ellipse(-r*.5, r*.18, r*.22, r*.14, -0.3, 0, Math.PI*2); ctx2d.fill();
  ctx2d.beginPath(); ctx2d.ellipse( r*.5, r*.18, r*.22, r*.14,  0.3, 0, Math.PI*2); ctx2d.fill();

  // Baby hair — a few scraggly strands
  ctx2d.strokeStyle='rgba(80,50,20,0.55)'; ctx2d.lineWidth=Math.max(1,r*.04); ctx2d.lineCap='round';
  ctx2d.beginPath(); ctx2d.moveTo(-r*.18,-r*.88); ctx2d.quadraticCurveTo(-r*.3,-r*1.1,-r*.15,-r*1.0); ctx2d.stroke();
  ctx2d.beginPath(); ctx2d.moveTo(0,-r*.9);       ctx2d.quadraticCurveTo(r*.05,-r*1.15,r*.1,-r*1.05); ctx2d.stroke();
  ctx2d.beginPath(); ctx2d.moveTo(r*.2,-r*.86);   ctx2d.quadraticCurveTo(r*.4,-r*1.08,r*.28,-r*.95); ctx2d.stroke();

  ctx2d.restore();
}

// ================================================================
//  PAUSE
// ================================================================
const pauseBtn  = document.getElementById('pause-btn');
const ICON_PAUSE = `<svg viewBox="0 0 24 24"><rect x="5" y="3" width="5" height="18" rx="1"/><rect x="14" y="3" width="5" height="18" rx="1"/></svg>`;
const ICON_PLAY  = `<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>`;

function togglePause(){
  if(!game||game.over) return;
  paused=!paused;
  pauseBtn.innerHTML=paused?ICON_PLAY:ICON_PAUSE;
  paused?SFX.pause():SFX.resume();
}
pauseBtn.addEventListener('click',togglePause);
document.addEventListener('keydown',e=>{
  if(e.code==='KeyP'||e.code==='Escape') togglePause();
  if(e.code==='KeyM') toggleMute();
});

// ================================================================
//  MUTE
// ================================================================
const muteBtn = document.getElementById('mute-btn');
const ICON_SOUND = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>`;
const ICON_MUTE  = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`;

function toggleMute(){
  const m = SFX.toggleMute();
  muteBtn.innerHTML = m ? ICON_MUTE : ICON_SOUND;
  muteBtn.style.color = m ? 'rgba(0,220,255,0.3)' : 'rgba(0,220,255,0.9)';
}
muteBtn.addEventListener('click', toggleMute);

// ================================================================
//  INPUT
// ================================================================
let held=false;
function onMove(e){if(!game||game.over||paused)return;const t=e.touches?e.touches[0]:e;game.setAngle(t.clientX,t.clientY);}
function onDown(e){
  if(paused){togglePause();return;}
  if(!game||game.over)return;
  held=true;const t=e.touches?e.touches[0]:e;game.setAngle(t.clientX,t.clientY);e.preventDefault();
}
function onUp(){if(!game||game.over||paused)return;if(held){game.shoot();held=false;}}

canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mouseup',   onUp);
canvas.addEventListener('touchmove', onMove,{passive:false});
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchend',  onUp,  {passive:false});

// ================================================================
//  START
// ================================================================
function startGame(){
  paused=false; pauseBtn.innerHTML=ICON_PAUSE;
  document.getElementById('overlay').classList.add('hidden');
  game=new Game(); lastTS=performance.now();
}
document.getElementById('start-btn').addEventListener('click',startGame);

// ================================================================
//  LOOP
// ================================================================
function loop(ts){
  const dt=Math.min(ts-lastTS,100); lastTS=ts;
  if(game){ if(!paused) game.update(dt); game.draw(); }
  requestAnimationFrame(loop);
}
window.addEventListener('resize',()=>{resize();if(game&&!game.over)game.initLevel();});
resize();
requestAnimationFrame(ts=>{lastTS=ts;requestAnimationFrame(loop);});
</script>
</body>
