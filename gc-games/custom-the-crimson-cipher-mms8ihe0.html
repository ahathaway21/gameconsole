<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="game-name" content="The Crimson Cipher">
<meta name="game-emoji" content="🔍">
<meta name="game-description" content="A detective match-3 mystery — swap clues, collect evidence, and crack the Crimson Cipher before your moves run out.">
<title>The Crimson Cipher</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050510;--surface:#0f0f1e;--surface2:#18182a;
  --gold:#c9a84c;--gold-l:#f0d080;--gold-d:rgba(201,168,76,0.22);
  --crimson:#8b1818;--crimson-b:#dc3535;
  --text:#e8dcc8;--text-dim:#9a8a70;
  --ts:44px;--tg:2px;--stride:46px;
}
body{
  background:radial-gradient(ellipse at 25% 15%,#14083a 0%,var(--bg) 55%),radial-gradient(ellipse at 80% 80%,#200a0a 0%,transparent 50%);
  color:var(--text);font-family:'Libre Baskerville','Georgia',serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:10px 8px 30px;
}
h1{font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:900;color:var(--gold);
   letter-spacing:4px;text-align:center;text-shadow:0 0 40px rgba(201,168,76,0.45);line-height:1;}
.subtitle{font-size:.65rem;letter-spacing:5px;text-transform:uppercase;color:var(--text-dim);text-align:center;margin-top:3px;}
.sep{width:50px;height:1px;background:var(--gold-d);margin:10px auto;}

/* Stats row */
.stats-row{display:flex;gap:5px;width:100%;max-width:360px;margin:9px 0 5px;}
.stat{flex:1;background:var(--surface);border:1px solid var(--gold-d);border-radius:8px;padding:5px 3px;text-align:center;}
.stat-label{font-size:.52rem;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;}
.stat-value{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--gold);}
#lives-val{font-size:.78rem;letter-spacing:1px;}

/* Streak row */
.streak-row{display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:360px;background:var(--surface);border:1px solid var(--gold-d);
  border-radius:8px;padding:6px 11px;margin-bottom:5px;}
.streak-left{display:flex;align-items:center;gap:7px;}
.streak-label{font-size:.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;}
.streak-count{font-family:'Playfair Display',serif;font-size:1.05rem;color:#f06030;font-weight:700;}
.streak-dots{display:flex;gap:3px;margin-top:3px;}
.sdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.1);transition:background .3s;}
.sdot.lit{background:var(--gold);}
.daily-btn{background:linear-gradient(135deg,var(--crimson),var(--crimson-b));border:1px solid rgba(220,53,53,.5);
  color:#fff;border-radius:6px;padding:5px 11px;cursor:pointer;font-family:'Playfair Display',serif;
  font-size:.8rem;transition:all .2s;}
.daily-btn:hover{filter:brightness(1.2);transform:scale(1.04);}
.daily-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.daily-timer{font-size:.55rem;color:var(--text-dim);margin-top:2px;text-align:right;}

/* Progress bars */
.bars{width:100%;max-width:360px;margin-bottom:7px;}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.bar-lbl{font-size:.52rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;width:26px;}
.bar-bg{flex:1;background:rgba(255,255,255,.05);border-radius:8px;height:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:8px;transition:width .45s ease;}
.xp-fill{background:linear-gradient(90deg,var(--gold),var(--gold-l));box-shadow:0 0 5px var(--gold);}
.goal-fill{background:linear-gradient(90deg,var(--crimson),var(--crimson-b));box-shadow:0 0 5px var(--crimson-b);}
.bar-end{font-size:.58rem;color:var(--text-dim);min-width:28px;text-align:right;}

/* Grid */
.grid-wrap{position:relative;padding:7px;background:#08081a;
  border:2px solid var(--gold-d);border-radius:12px;
  box-shadow:0 0 35px rgba(0,0,0,.65),inset 0 0 20px rgba(0,0,0,.4);
  margin-bottom:8px;}
#grid{display:grid;grid-template-columns:repeat(7,var(--ts));grid-template-rows:repeat(7,var(--ts));
  gap:var(--tg);position:relative;}
.tile{width:var(--ts);height:var(--ts);border-radius:7px;display:flex;align-items:center;justify-content:center;
  font-size:19px;cursor:pointer;border:1px solid transparent;user-select:none;
  position:relative;z-index:1;transition:transform .08s;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.tile span{pointer-events:none;}
.tile:active{transform:scale(.94);}
.tile.selected{z-index:3;animation:tpulse .55s ease-in-out infinite alternate;}
@keyframes tpulse{
  from{box-shadow:0 0 0 2px #fff,0 0 10px rgba(255,255,255,.3);}
  to{box-shadow:0 0 0 2px var(--gold-l),0 0 18px rgba(240,208,128,.5);}
}
.tile.matched{animation:tpop .38s ease-out forwards;z-index:2;}
@keyframes tpop{
  0%{transform:scale(1);opacity:1;}
  35%{transform:scale(1.28);opacity:.75;filter:brightness(1.7);}
  100%{transform:scale(0);opacity:0;}
}
.tile.explode{animation:texplode .55s ease-out forwards;z-index:4;}
@keyframes texplode{
  0%{transform:scale(1);opacity:1;filter:brightness(1);}
  20%{transform:scale(1.5);filter:brightness(3) saturate(2);}
  55%{transform:scale(.9) rotate(15deg);opacity:.6;filter:brightness(2);}
  100%{transform:scale(0) rotate(30deg);opacity:0;filter:brightness(1);}
}
.tile.new-tile{animation:tdrop .3s ease-out;}
@keyframes tdrop{
  0%{transform:translateY(-44px) scale(.8);opacity:0;}
  65%{transform:translateY(3px);}
  100%{transform:translateY(0) scale(1);opacity:1;}
}
.tile.shake{animation:tshake .32s ease-in-out;}
@keyframes tshake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-5px);}
  60%{transform:translateX(5px);}
  80%{transform:translateX(-3px);}
}
.tile.t-empty{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.04);}
.t0{background:linear-gradient(135deg,#0b2038,#142d4e);border-color:#3a6ba0;color:#7ab8f5;}
.t1{background:linear-gradient(135deg,#1e1400,#332200);border-color:#a07828;color:#f0d080;}
.t2{background:linear-gradient(135deg,#1e0e00,#312000);border-color:#a0581e;color:#f0a060;}
.t3{background:linear-gradient(135deg,#081e08,#0d2e0d);border-color:#2e7a2e;color:#80c880;}
.t4{background:linear-gradient(135deg,#120820,#1e1035);border-color:#6a3aaa;color:#b880f0;}
.t5{background:linear-gradient(135deg,#1a0a0a,#2e1010);border-color:#b83030;color:#f07070;}
.t6{background:linear-gradient(135deg,#0a1a1a,#102828);border-color:#208080;color:#50d0d0;}
/* Move timer */
.timer-stat .stat-value{transition:color .2s;}
.timer-stat.danger .stat-value{color:var(--crimson-b)!important;animation:tpulse-txt .4s ease-in-out infinite alternate;}
@keyframes tpulse-txt{from{opacity:1;}to{opacity:.5;}}
.timer-bar-bg{height:3px;background:rgba(255,255,255,.07);border-radius:3px;margin-top:3px;overflow:hidden;}
.timer-bar-fill{height:100%;border-radius:3px;transition:width .1s linear,background .3s;}
.timer-bar-safe{background:var(--gold);}
.timer-bar-danger{background:var(--crimson-b);}

/* Tile vibration when ≤3s */
@keyframes tvib{
  0%,100%{transform:translate(0,0);}
  20%{transform:translate(-2px,1px);}
  40%{transform:translate(2px,-1px);}
  60%{transform:translate(-1px,2px);}
  80%{transform:translate(1px,-2px);}
}
.grid-danger .tile:not(.selected):not(.matched){
  animation:tvib .7s ease-in-out infinite;
}
.grid-danger .tile:nth-child(even):not(.selected):not(.matched){
  animation-delay:.15s;
}
.grid-danger .tile:nth-child(3n):not(.selected):not(.matched){
  animation-delay:.3s;
}

.tile.ev-reveal{animation:evreveal .7s ease-out!important;}
@keyframes evreveal{
  0%{transform:scale(0.5);opacity:0;filter:brightness(3);}
  40%{transform:scale(1.22);filter:brightness(1.8);}
  70%{transform:scale(0.95);}
  100%{transform:scale(1);opacity:1;filter:brightness(1);}
}
.te{background:linear-gradient(135deg,#082018,#0e3820);border-color:#28b878;color:#60f0a0;
    animation:teglow 1.2s ease-in-out infinite alternate;}
@keyframes teglow{
  from{box-shadow:0 0 6px rgba(40,184,120,.3);}
  to{box-shadow:0 0 16px rgba(40,184,120,.65),0 0 4px rgba(40,184,120,.3);}
}

/* Evidence panel */
.evidence-panel{width:100%;max-width:360px;background:var(--surface);
  border:1px solid var(--gold-d);border-radius:8px;padding:8px 11px;margin-bottom:7px;}
.ev-label{font-size:.55rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
.ev-slots{display:flex;gap:7px;}
.ev-slot{flex:1;height:30px;border:1px dashed rgba(201,168,76,.2);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:.68rem;color:rgba(154,138,112,.5);transition:all .3s;}
.ev-slot.filled{background:linear-gradient(135deg,#082018,#0e3820);border:1px solid #28b878;
  color:#60f0a0;font-size:17px;animation:slotfill .4s ease-out;}
@keyframes slotfill{0%{transform:scale(.8);opacity:0;}60%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}

/* Leaderboard */
.leaderboard{width:100%;max-width:360px;background:var(--surface);
  border:1px solid var(--gold-d);border-radius:8px;padding:8px 11px;margin-bottom:10px;}
.lb-head{font-size:.55rem;color:var(--gold);text-transform:uppercase;letter-spacing:2px;
  margin-bottom:6px;display:flex;justify-content:space-between;}
.lb-row{display:flex;align-items:center;padding:3px 0;font-size:.8rem;
  border-bottom:1px solid rgba(255,255,255,.04);}
.lb-row:last-child{border-bottom:none;}
.lb-rank{width:18px;color:var(--text-dim);font-size:.7rem;}
.lb-name{flex:1;}
.lb-score{font-family:'Playfair Display',serif;color:var(--gold);}
.lb-row.you{background:rgba(201,168,76,.06);border-radius:4px;padding:3px 4px;}

/* Score popup */
.score-popup{position:absolute;left:50%;top:33%;z-index:50;pointer-events:none;
  font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;
  color:var(--gold-l);text-shadow:0 0 14px rgba(201,168,76,.85),0 2px 5px rgba(0,0,0,.9);
  white-space:nowrap;animation:sfloat 1s ease-out forwards;}
@keyframes sfloat{
  0%{transform:translateX(-50%) scale(.9);opacity:0;}
  15%{transform:translateX(-50%) translateY(-8px) scale(1.1);opacity:1;}
  100%{transform:translateX(-50%) translateY(-72px) scale(1);opacity:0;}
}

/* Achievement toast */
.toast{position:fixed;top:16px;right:16px;background:var(--surface);
  border:1px solid var(--gold);border-radius:10px;padding:10px 13px;
  display:flex;align-items:center;gap:9px;max-width:230px;z-index:999;
  box-shadow:0 4px 22px rgba(0,0,0,.55),0 0 22px rgba(201,168,76,.12);
  animation:tin .35s ease-out;}
@keyframes tin{from{transform:translateX(250px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes tout{from{transform:translateX(0);opacity:1;}to{transform:translateX(250px);opacity:0;}}
.toast-icon{font-size:22px;flex-shrink:0;}
.toast-title{font-size:.55rem;color:var(--gold);text-transform:uppercase;letter-spacing:1px;}
.toast-name{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--text);}
.toast-desc{font-size:.7rem;color:var(--text-dim);}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.87);
  display:flex;align-items:center;justify-content:center;z-index:500;
  backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);}
.modal{background:var(--surface);border:2px solid var(--gold-d);border-radius:16px;
  padding:28px 22px;max-width:310px;width:92%;text-align:center;
  box-shadow:0 0 60px rgba(0,0,0,.8),0 0 40px rgba(201,168,76,.07);}
.modal-title{font-family:'Playfair Display',serif;font-size:1.45rem;color:var(--gold);margin-bottom:6px;}
.modal-text{font-size:.88rem;color:var(--text-dim);line-height:1.7;font-style:italic;margin-bottom:18px;}
.modal-btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;}
.lvl-badge{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--crimson),var(--crimson-b));
  display:flex;align-items:center;justify-content:center;font-size:1.9rem;
  margin:0 auto 14px;box-shadow:0 0 22px rgba(220,53,53,.4);}
.btn{background:linear-gradient(135deg,var(--crimson),var(--crimson-b));border:1px solid rgba(220,53,53,.5);
  color:#fff;border-radius:8px;padding:9px 20px;cursor:pointer;font-family:'Playfair Display',serif;
  font-size:.9rem;letter-spacing:.5px;transition:all .2s;}
.btn:hover{filter:brightness(1.2);transform:scale(1.03);}
.btn.gold{background:linear-gradient(135deg,#5a4010,var(--gold));border-color:var(--gold);color:#1a1000;}
.modal strong{color:var(--gold);}
.hidden{display:none!important;}
.mute-btn{background:var(--surface);
  border:1px solid var(--gold-d);border-radius:7px;padding:5px 9px;cursor:pointer;
  font-size:15px;line-height:1;color:var(--text-dim);transition:all .18s;}
.mute-btn:hover{border-color:var(--gold);color:var(--gold);}
.mute-btn.muted{opacity:.45;}

/* Pause overlay on grid */
.pause-overlay{position:absolute;inset:0;border-radius:10px;
  background:rgba(5,5,16,.92);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:20;
  font-family:'Playfair Display',serif;}
.pause-title{font-size:1.6rem;color:var(--gold);letter-spacing:4px;margin-bottom:6px;}
.pause-sub{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:3px;}
#grid.paused .tile span{visibility:hidden;}
#grid.paused .tile{filter:brightness(.3);}
</style>
</head>
<body>

<div style="margin-bottom:5px;text-align:center;padding-top:6px;">
  <h1>THE CRIMSON CIPHER</h1>
  <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:3px;">
    <div class="subtitle" style="margin:0;">A Detective Match-3 Mystery</div>
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()" title="Toggle sound">🔊</button>
    <button class="mute-btn" id="pause-btn" onclick="togglePause()" title="Pause">⏸</button>
  </div>
</div>

<div class="stats-row">
  <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score-val">0</div></div>
  <div class="stat"><div class="stat-label">Case</div><div class="stat-value" id="level-val">1</div></div>
  <div class="stat"><div class="stat-label">Moves</div><div class="stat-value" id="moves-val">25</div></div>
  <div class="stat timer-stat" id="timer-stat"><div class="stat-label">Time</div><div class="stat-value" id="timer-val">5.0</div><div class="timer-bar-bg"><div class="timer-bar-fill timer-bar-safe" id="timer-bar" style="width:100%"></div></div></div>
  <div class="stat"><div class="stat-label">Lives</div><div class="stat-value" id="lives-val">♥♥♥♥♥</div></div>
</div>

<div class="streak-row">
  <div class="streak-left">
    <div style="font-size:20px;">🔥</div>
    <div>
      <div class="streak-label">Detective Streak</div>
      <div><span class="streak-count" id="streak-val">0</span><span style="font-size:.7rem;color:var(--text-dim)"> days</span></div>
      <div class="streak-dots" id="streak-dots"></div>
    </div>
  </div>
  <div style="text-align:right;">
    <button class="daily-btn" id="daily-btn" onclick="claimDaily()">Claim Daily</button>
    <div class="daily-timer" id="daily-timer"></div>
  </div>
</div>

<div class="bars">
  <div class="bar-row">
    <div class="bar-lbl">XP</div>
    <div class="bar-bg"><div class="bar-fill xp-fill" id="xp-bar" style="width:0%"></div></div>
    <div class="bar-end" id="xp-end">Lv 1</div>
  </div>
  <div class="bar-row">
    <div class="bar-lbl">Goal</div>
    <div class="bar-bg"><div class="bar-fill goal-fill" id="goal-bar" style="width:0%"></div></div>
    <div class="bar-end" id="goal-end">0%</div>
  </div>
</div>

<div class="grid-wrap" id="grid-wrap">
  <div id="grid"></div>
  <div class="pause-overlay hidden" id="pause-overlay">
    <div class="pause-title">PAUSED</div>
    <div class="pause-sub">Tap ⏸ to resume</div>
  </div>
</div>

<div class="evidence-panel">
  <div class="ev-label">Evidence Collected — Tap <span style="color:#60f0a0">🌿</span> tiles to collect</div>
  <div class="ev-slots" id="ev-slots">
    <div class="ev-slot" id="ev0">Tap 🌿</div>
    <div class="ev-slot" id="ev1">Tap 🌿</div>
    <div class="ev-slot" id="ev2">Tap 🌿</div>
  </div>
</div>

<div class="leaderboard">
  <div class="lb-head"><span>Top Detectives</span><span id="lb-case">Case 1</span></div>
  <div id="lb-list"></div>
</div>

<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal" id="modal-box"></div>
</div>

<script>
// ─── CONSTANTS ──────────────────────────────────────────────
const GS = 7, TYPES = 7, EV_TYPE = 7, EV_NEED = 3, STRIDE = 46;

const TD = [
  {e:'🔍',l:'Clue'},{e:'🗝️',l:'Key'},{e:'🕯️',l:'Candle'},
  {e:'📜',l:'Scroll'},{e:'🔮',l:'Crystal'},
  {e:'💀',l:'Skull'},{e:'⚗️',l:'Vial'}
];

function activeTypes(){return Math.min(TYPES,5+Math.floor(levelIdx/7));}

const LEVELS = [
  {goal:1000, moves:20,story:"The vault stands open — its lock shattered from within. A faint scent of roses. Someone wanted you to find this."},
  {goal:2000, moves:18,story:"A monogrammed glove near the window. Initials: R.V. Your best informant goes silent that same night."},
  {goal:3500, moves:17,story:"The Crimson Cipher: an ancient decoder that no modern algorithm can crack. Governments have killed for less."},
  {goal:5500, moves:16,story:"Lady Voss. Socialite. Philanthropist. The city whispers she holds secrets that could topple a dynasty."},
  {goal:8000, moves:15,story:"Her mansion is a labyrinth. Every painting hides a clue. Every smile conceals a calculated betrayal."},
  {goal:11000,moves:14,story:"A second Cipher exists. Someone has been two steps ahead of you — watching from the very start."},
  {goal:15000,moves:13,story:"A traitor in your department. Every move you made was fed to the enemy. You've been hunting blind."},
  {goal:20000,moves:13,story:"Midnight at the docks. The exchange is imminent. You have one chance to stop the handoff."},
  {goal:26000,moves:12,story:"The mastermind steps into the light. You've crossed paths before. You just didn't know it then."},
  {goal:33000,moves:12,story:"The Crimson Cipher doesn't decode messages. It unlocks a vault containing evidence that could bring down an empire. Case closed."},
];

const ACHV = [
  {id:'first',  i:'👁️',t:'Sharp Eye',     d:'Made your first match'},
  {id:'cascade',i:'⛓️',t:'Chain Reaction',d:'Triggered a triple cascade!'},
  {id:'evidence',i:'📁',t:'First Clue',    d:'Collected your first evidence'},
  {id:'big5',   i:'💫',t:'Magnificent',   d:'Matched 5+ tiles at once!'},
  {id:'lv5',    i:'🕵️',t:'Half Truth',    d:'Reached Case 5'},
  {id:'lv10',   i:'🏆',t:'Case Closed',   d:'Solved The Crimson Cipher!'},
  {id:'streak3',i:'🔥',t:'Devoted',       d:'3-day detective streak!'},
  {id:'10k',    i:'⭐',t:'Master Sleuth', d:'Scored 10,000+ total points'},
];

const FAKE_LB = [
  {n:'Inspector Crane',s:35200},{n:'Agent Harrow',s:27600},
  {n:'Mx. Vance',s:19400},{n:'Detective Rue',s:12800},{n:'Constable Gray',s:6500}
];

// ─── STATE ──────────────────────────────────────────────────
let grid=[], cellEls=[], newIds=new Set(), uid=0;
let score=0,levelIdx=0,movesLeft=0,evCount=0;
let selCell=null,animLock=false,firstMatchDone=false;
let shakeCells=new Set();
let totalScore=0,playerXP=0,playerLv=1,streak=0,lives=5;
let dailyClaimed=false,unlockedA=new Set();

// ─── MOVE TIMER ──────────────────────────────────────────────
const MOVE_TIME=8.0;
let moveTimeLeft=MOVE_TIME, timerInterval=null, timerActive=false, paused=false;

// ─── STORAGE ────────────────────────────────────────────────
const ls=(k)=>localStorage.getItem(k);
const ss=(k,v)=>localStorage.setItem(k,v);
function loadData(){
  try{
    totalScore=+ls('cc_ts')||0; playerXP=+ls('cc_xp')||0;
    playerLv=+ls('cc_pl')||1; streak=+ls('cc_sk')||0;
    lives=+ls('cc_lv')||5; levelIdx=+ls('cc_li')||0;
    const a=ls('cc_ac'); if(a)unlockedA=new Set(JSON.parse(a));
    const today=new Date().toDateString();
    const lastDay=ls('cc_ld')||'';
    dailyClaimed=(ls('cc_dc')===today);
    if(lastDay&&lastDay!==today){
      const diff=Math.round((new Date(today)-new Date(lastDay))/86400000);
      if(diff===1){streak++;if(streak>=3)unlockA('streak3');}

  }catch(e){}

function tone(f,dur=.15,type='sine',vol=.18){

    o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=f;
    g.gain.setValueAtTime(vol,c.currentTime);

    o.start();o.stop(c.currentTime+dur+.01);}catch(e){}
}

const delay=ms=>new Promise(r=>setTimeout(r,ms));
function rndType(){return Math.floor(Math.random()*activeTypes());}

// ─── EVIDENCE SPAWN SCHEDULE ─────────────────────────────────
let evSpawned=0, evThresholds=[];
function buildEvThresholds(totalMoves){
  // Three staggered checkpoints: early, middle, late — all guaranteed before moves run out
  const t1=totalMoves-3;
  const t2=Math.round(totalMoves*0.50);
  const t3=Math.max(3,Math.round(totalMoves*0.15));
  evThresholds=[t1,t2,t3];
}
function checkEvSpawn(){
  if(evSpawned>=EV_NEED)return;
  const threshold=evThresholds[evSpawned];
  if(movesLeft!==threshold)return;
  injectEvTile();
}
function injectEvTile(){
  // Collect all non-evidence, non-empty cells
  const candidates=[];
  for(let r=0;r<GS;r++)for(let c=0;c<GS;c++){
    if(grid[r][c].t>=0&&grid[r][c].t!==EV_TYPE)candidates.push({r,c});
  }
  if(!candidates.length)return;
  const{r,c}=candidates[Math.floor(Math.random()*candidates.length)];
  grid[r][c]={t:EV_TYPE,id:uid++};
  evSpawned++;
  // Pulse-reveal animation on that cell
  const el=cellEls[r][c];
  el.classList.add('ev-reveal');
  setTimeout(()=>el.classList.remove('ev-reveal'),700);
  renderGrid();
  tone(880,.18,'sine',.13);setTimeout(()=>tone(1100,.18,'sine',.13),140);
}

function initGrid(){
  grid=[];
  for(let r=0;r<GS;r++){grid[r]=[];for(let c=0;c<GS;c++)grid[r][c]={t:rndType(),id:uid++};}
}

function findMatches(){
  // Lightweight version used only for swap-validity check
  const f=new Set();
  for(let r=0;r<GS;r++){
    let c=0;while(c<GS){
      const t=grid[r][c].t;if(t<0||t===EV_TYPE){c++;continue;}
      let e=c+1;while(e<GS&&grid[r][e].t===t)e++;
      if(e-c>=3)for(let i=c;i<e;i++)f.add(r+','+i);
      c=e;
    }
  }
  for(let c=0;c<GS;c++){
    let r=0;while(r<GS){
      const t=grid[r][c].t;if(t<0||t===EV_TYPE){r++;continue;}
      let e=r+1;while(e<GS&&grid[e][c].t===t)e++;
      if(e-r>=3)for(let i=r;i<e;i++)f.add(i+','+c);
      r=e;
    }
  }
  return f;
}

function findMatchData(){
  // Full version: detects 5+ runs, expands to neighbors for explosion
  const runs=[];
  for(let r=0;r<GS;r++){
    let c=0;while(c<GS){
      const t=grid[r][c].t;if(t<0||t===EV_TYPE){c++;continue;}
      let e=c+1;while(e<GS&&grid[r][e].t===t)e++;
      if(e-c>=3){const cells=[];for(let i=c;i<e;i++)cells.push({r,c:i});runs.push({cells,len:e-c});}
      c=e;
    }
  }
  for(let c=0;c<GS;c++){
    let r=0;while(r<GS){
      const t=grid[r][c].t;if(t<0||t===EV_TYPE){r++;continue;}
      let e=r+1;while(e<GS&&grid[e][c].t===t)e++;
      if(e-r>=3){const cells=[];for(let i=r;i<e;i++)cells.push({r:i,c});runs.push({cells,len:e-r});}
      r=e;
    }
  }
  const matchKeys=new Set(), explodeKeys=new Set();
  let has5=false;
  for(const run of runs){
    run.cells.forEach(({r,c})=>matchKeys.add(r+','+c));
    if(run.len>=5){
      has5=true;
      run.cells.forEach(({r,c})=>{
        for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
          if(dr===0&&dc===0)continue;
          const nr=r+dr,nc=c+dc;
          if(nr>=0&&nr<GS&&nc>=0&&nc<GS){
            const key=nr+','+nc;
            if(!matchKeys.has(key)&&grid[nr][nc].t!==-1)explodeKeys.add(key);
          }
        }
      });
    }
  }
  return{matchKeys,explodeKeys,has5};
}

function applyGravity(){
  for(let c=0;c<GS;c++){
    let w=GS-1;
    for(let r=GS-1;r>=0;r--){
      if(grid[r][c].t!==-1){
        if(w!==r){grid[w][c]=grid[r][c];grid[r][c]={t:-1,id:uid++};}
        w--;
      }
    }
    while(w>=0){
      const nt={t:rndType(),id:uid++};
      newIds.add(nt.id);grid[w][c]=nt;w--;
    }
  }
}

async function processMatches(){
  let cas=0;
  while(true){
    const{matchKeys,explodeKeys,has5}=findMatchData();
    if(matchKeys.size===0)break;
    // Animate matches
    matchKeys.forEach(k=>{const[r,c]=k.split(',').map(Number);cellEls[r][c].classList.add('matched');});
    explodeKeys.forEach(k=>{const[r,c]=k.split(',').map(Number);cellEls[r][c].classList.add('explode');});
    const allKeys=[...matchKeys,...explodeKeys];
    const multi=1+cas*.40;
    const basePts=Math.floor(matchKeys.size*50*multi);
    const explodePts=has5?Math.floor(basePts*2):basePts;
    score+=explodePts;totalScore+=explodePts;
    showScorePop(explodePts,cas,has5);
    sndMatch(matchKeys.size,cas);
    if(has5){
      movesLeft+=5;
      showToast('💥','Explosion!','5 in a Row!','+5 moves & double points!');
      [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,.2,'sine',.2),i*60));
    }
    if(!firstMatchDone){firstMatchDone=true;unlockA('first');}
    if(matchKeys.size>=5||has5)unlockA('big5');
    if(cas>=2)unlockA('cascade');
    if(totalScore>=10000)unlockA('10k');
    await delay(has5?520:390);
    allKeys.forEach(k=>{const[r,c]=k.split(',').map(Number);grid[r][c]={t:-1,id:uid++};});
    applyGravity();
    renderGrid();
    await delay(310);
    cas++;
  }
  updateUI();saveData();
}

async function animSwap(r1,c1,r2,c2){
  const eA=cellEls[r1][c1],eB=cellEls[r2][c2];
  const dx=(c2-c1)*STRIDE,dy=(r2-r1)*STRIDE;
  eA.style.transition=eB.style.transition='transform .16s ease-in-out';
  eA.style.zIndex='5';eB.style.zIndex='4';
  eA.style.transform=`translate(${dx}px,${dy}px)`;
  eB.style.transform=`translate(${-dx}px,${-dy}px)`;
  await delay(190);
  eA.style.transition=eB.style.transition='';
  eA.style.zIndex=eB.style.zIndex='';
  eA.style.transform=eB.style.transform='';
}

async function handleClick(r,c){
  if(animLock||paused)return;
  const tile=grid[r][c];
  if(tile.t===EV_TYPE){
    if(selCell){selCell=null;renderGrid();}
    animLock=true;await collectEv(r,c);animLock=false;return;
  }
  if(!selCell){selCell={r,c};renderGrid();sndSelect();return;}
  const{r:r1,c:c1}=selCell;selCell=null;
  if(r1===r&&c1===c){renderGrid();return;}
  const dr=Math.abs(r-r1),dc=Math.abs(c-c1);
  if(dr+dc!==1){selCell={r,c};renderGrid();sndSelect();return;}
  animLock=true;
  await animSwap(r1,c1,r,c);
  [grid[r1][c1],grid[r][c]]=[grid[r][c],grid[r1][c1]];
  renderGrid();
  const m=findMatches();
  if(m.size===0){
    await animSwap(r1,c1,r,c);
    [grid[r1][c1],grid[r][c]]=[grid[r][c],grid[r1][c1]];
    const sk=[r1+','+c1,r+','+c];
    sk.forEach(k=>shakeCells.add(k));
    renderGrid();
    sk.forEach(k=>setTimeout(()=>{shakeCells.delete(k);},380));
    sndInvalid();
  }else{
    movesLeft--;
    checkEvSpawn();
    stopMoveTimer();
    await processMatches();
    checkWinLose();
    if(movesLeft>0)startMoveTimer();
  }
  animLock=false;
}

async function collectEv(r,c){
  if(evCount>=EV_NEED)return;
  cellEls[r][c].classList.add('matched');
  await delay(370);
  grid[r][c]={t:-1,id:uid++};
  evCount++;
  updateEvSlots();
  unlockA('evidence');
  sndEvidence();
  if(evCount>=EV_NEED){
    movesLeft+=3;
    showToast('📁','Case Complete!','Evidence Secured','+3 bonus moves awarded!');
    [880,1100,1320].forEach((f,i)=>setTimeout(()=>tone(f,.22,'sine',.18),i*100));
  }
  const nt={t:Math.floor(Math.random()*activeTypes()),id:uid++};
  newIds.add(nt.id);grid[r][c]=nt;
  renderGrid();updateUI();saveData();
  resetMoveTimer();
}

// ─── RENDERING ──────────────────────────────────────────────
function buildGrid(){
  const el=document.getElementById('grid');el.innerHTML='';cellEls=[];
  for(let r=0;r<GS;r++){
    cellEls[r]=[];
    for(let c=0;c<GS;c++){
      const d=document.createElement('div');
      d.className='tile';
      const sp=document.createElement('span');
      d.appendChild(sp);
      d.addEventListener('click',()=>handleClick(r,c));
      el.appendChild(d);cellEls[r][c]=d;
    }
  }
}

function renderGrid(){
  for(let r=0;r<GS;r++){
    for(let c=0;c<GS;c++){
      const el=cellEls[r][c],tile=grid[r][c],sp=el.querySelector('span');
      let cls='tile';
      if(tile.t===-1){cls+=' t-empty';el.className=cls;sp.textContent='';continue;}
      if(tile.t===EV_TYPE)cls+=' te';
      else cls+=' t'+tile.t;
      if(selCell&&selCell.r===r&&selCell.c===c)cls+=' selected';
      if(newIds.has(tile.id)){cls+=' new-tile';newIds.delete(tile.id);}
      if(shakeCells.has(r+','+c))cls+=' shake';
      el.className=cls;
      sp.textContent=tile.t===EV_TYPE?'🌿':TD[tile.t].e;
    }
  }
}

}

function updateEvSlots(){
  for(let i=0;i<EV_NEED;i++){
    const s=document.getElementById('ev'+i);
    if(i<evCount){s.className='ev-slot filled';s.textContent='🌿';}
    else{s.className='ev-slot';s.textContent='Tap 🌿';}
  }
}

function updateLB(){
  const list=document.getElementById('lb-list');
  document.getElementById('lb-case').textContent='Case '+(levelIdx+1);
  const entries=[...FAKE_LB,{n:'You',s:totalScore,y:true}]
    .sort((a,b)=>b.s-a.s).slice(0,5);
  list.innerHTML=entries.map((e,i)=>`
    <div class="lb-row${e.y?' you':''}">
      <span class="lb-rank">${i+1}</span>
      <span class="lb-name">${e.n}</span>
      <span class="lb-score">${e.s.toLocaleString()}</span>
    </div>`).join('');
}

// ─── FOMO TIMER ──────────────────────────────────────────────
setInterval(updateDailyTimer,60000);

// ─── INIT ───────────────────────────────────────────────────
function init(){
  loadData();
  buildGrid();
  startLevel(levelIdx);
  updateEvSlots();
  updateLB();
  showWelcome();
}

window.addEventListener('DOMContentLoaded',()=>{
  const btn=document.getElementById('mute-btn');
  btn.textContent=muted?'🔇':'🔊';
  btn.classList.toggle('muted',muted);
  init();
});
</script>
</body>
</html>
