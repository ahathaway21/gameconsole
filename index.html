<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Game Center</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Syne:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:#07070f;color:#f0f0ff;font-family:'Syne',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;background:#0d0d1a}
::-webkit-scrollbar-thumb{background:#6d28d9;border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.screen{animation:slideUp .28s ease-out}
.card{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:18px}
.btn{display:inline-block;border:none;border-radius:11px;padding:13px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;transition:transform .12s,filter .12s;color:#fff;text-align:center;line-height:1.2}
.btn:active{transform:scale(.96)}
.btn:hover{filter:brightness(1.15)}
.btn-ghost{background:rgba(255,255,255,.07);color:#f0f0ff}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#5b21b6)}
.btn-red{background:linear-gradient(135deg,#dc2626,#b91c1c)}
.btn-full{width:100%}
.inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:11px;padding:13px 16px;color:#f0f0ff;font-size:15px;outline:none;font-family:'Syne',sans-serif;transition:border-color .2s}
.inp:focus{border-color:rgba(167,139,250,.6)}
.logo-font{font-family:'Orbitron',monospace;letter-spacing:.05em}
.tag{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.04em}
.err-msg{color:#f87171;font-size:13px;margin:0 0 10px}
.ok-msg{color:#4ade80;font-size:13px;margin:0 0 10px}
.spinner{width:34px;height:34px;border:3px solid rgba(167,139,250,.2);border-top:3px solid #a78bfa;border-radius:50%;animation:spin .7s linear infinite}
#game-overlay{position:fixed;inset:0;z-index:9999;display:none;flex-direction:column;background:#000}
#game-overlay.active{display:flex}
#game-back-bar{background:rgba(0,0,0,.92);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
#game-iframe{flex:1;border:none;width:100%;height:100%}
#score-panel{position:fixed;inset:0;z-index:10000;background:rgba(7,7,15,.96);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
#score-panel.active{display:flex;animation:fadeIn .3s ease-out}
</style>
</head>
<body>

<div id="game-overlay">
  <div id="game-back-bar">
    <button id="game-back-btn" class="btn btn-ghost" style="padding:8px 14px;font-size:13px">&#8592; Hub</button>
    <div id="game-title-bar" class="logo-font" style="font-size:13px;color:rgba(255,255,255,.5)"></div>
    <div style="width:80px"></div>
  </div>
  <iframe id="game-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<div id="score-panel">
  <div id="sp-emoji" style="font-size:64px;margin-bottom:12px"></div>
  <h2 class="logo-font" style="font-size:22px;font-weight:900;margin-bottom:6px">GAME OVER</h2>
  <p style="color:rgba(255,255,255,.4);font-size:13px;margin-bottom:14px">Your score</p>
  <div id="sp-score" class="logo-font" style="font-size:54px;font-weight:900;color:#fbbf24;line-height:1;text-shadow:0 0 20px rgba(251,191,36,.5)"></div>
  <div id="sp-rank" style="font-size:14px;font-weight:600;margin-top:10px"></div>
  <div id="sp-leaderboard" style="width:100%;max-width:360px;margin-top:20px"></div>
  <div style="display:flex;gap:12px;margin-top:24px;width:100%;max-width:360px">
    <button id="sp-back" class="btn btn-ghost" style="flex:1">&#8592; Hub</button>
    <button id="sp-again" class="btn btn-purple" style="flex:1">&#x1F504; Play Again</button>
  </div>
</div>

<div id="app"></div>

<script>
'use strict';

/* ================================================================
   CONFIG
================================================================ */
var FOUNDER_EMAIL = 'ahathaway21@gmail.com';

var BUILT_IN_GAMES = [{
  id:'cat-blast', name:'Cat Blast', emoji:'\uD83D\uDC31',
  description:'Block Blast with 7 cat breeds! Fill rows & columns to clear them.',
  bg:'linear-gradient(135deg,#7c3aed,#be185d)', accent:'#f472b6', builtin:true
}];

/* ================================================================
   STORAGE
================================================================ */
function gsGet(k){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return null; } }
function gsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

/* ================================================================
   GITHUB API  — all shared data lives in gc-data.json in the repo
================================================================ */
var GH = {
  owner:'', repo:'', token:'',
  configured: function(){ return !!(this.owner&&this.repo&&this.token); },
  load: function(){
    var c=gsGet('gc:gh-config');
    if(c){ this.owner=c.owner||''; this.repo=c.repo||''; this.token=c.token||''; }
  },
  save: function(o,r,t){
    this.owner=o; this.repo=r; this.token=t;
    gsSet('gc:gh-config',{owner:o,repo:r,token:t});
  }
};
GH.load();

// Unicode-safe base64 encode
function toB64(str){
  return btoa(unescape(encodeURIComponent(str)));
}

// Fetch gc-data.json from GitHub (public read, no auth needed)
function ghRead(){
  if(!GH.configured()) return Promise.resolve(null);
  var url='https://raw.githubusercontent.com/'+GH.owner+'/'+GH.repo+'/main/gc-data.json?t='+Date.now();
  return fetch(url).then(function(r){ return r.ok?r.json():null; }).catch(function(){ return null; });
}

// Write gc-data.json to GitHub (requires PAT)
function ghWrite(data){
  if(!GH.configured()) return Promise.resolve(false);
  var apiUrl='https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/gc-data.json';
  var headers={'Authorization':'token '+GH.token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'};
  // First get the current SHA
  return fetch(apiUrl,{headers:headers})
    .then(function(r){ return r.ok?r.json():null; })
    .then(function(existing){
      var body={message:'gc data update',content:toB64(JSON.stringify(data,null,2))};
      if(existing&&existing.sha) body.sha=existing.sha;
      return fetch(apiUrl,{method:'PUT',headers:headers,body:JSON.stringify(body)});
    })
    .then(function(r){ return r&&r.ok; })
    .catch(function(){ return false; });
}

// Build the canonical data object from localStorage
function buildGhData(){
  var scores={};
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.startsWith('gc:scores:')){ var v=gsGet(k); if(v&&v.length) scores[k.slice(10)]=v; }
  }
  // Store custom game metadata only (HTML too large for GitHub API)
  var cgMeta=(gsGet('gc:custom-games')||[]).map(function(g){
    return {id:g.id,name:g.name,emoji:g.emoji,description:g.description,bg:g.bg,accent:g.accent};
  });
  return {version:3,updatedAt:Date.now(),users:gsGet('gc:users')||[],
          invites:gsGet('gc:invites')||[],scores:scores,customGamesMeta:cgMeta};
}

// Apply data from GitHub into localStorage
function applyGhData(d){
  if(!d) return;
  // Only apply users if GitHub has actual data — never overwrite local with empty
  if(d.users && d.users.length > 0){
    var localUsers = gsGet('gc:users') || [];
    // Merge: GitHub is source of truth for existing users, but keep any local-only users
    var merged = d.users.slice();
    localUsers.forEach(function(lu){
      if(!merged.find(function(u){ return u.email === lu.email; })) merged.push(lu);
    });
    gsSet('gc:users', merged);
  }
  // Only apply invites if GitHub has data
  if(d.invites && d.invites.length > 0){
    var localInvites = gsGet('gc:invites') || [];
    var mergedInv = d.invites.slice();
    localInvites.forEach(function(li){
      if(!mergedInv.find(function(i){ return i.email === li.email; })) mergedInv.push(li);
    });
    gsSet('gc:invites', mergedInv);
  }
  // Scores: merge all, GitHub wins on conflicts
  if(d.scores){
    Object.keys(d.scores).forEach(function(gid){
      if(d.scores[gid] && d.scores[gid].length) gsSet('gc:scores:'+gid, d.scores[gid]);
    });
  }
  // Custom game metadata
  if(d.customGamesMeta && d.customGamesMeta.length){
    var local=gsGet('gc:custom-games')||[];
    var mergedGames=d.customGamesMeta.map(function(meta){
      var local1=local.find(function(g){return g.id===meta.id;});
      return local1?local1:Object.assign({html:'',builtin:false},meta);
    });
    local.forEach(function(g){
      if(!mergedGames.find(function(m){return m.id===g.id;})) mergedGames.push(g);
    });
    gsSet('gc:custom-games',mergedGames);
  }
}

// Pull from GitHub then continue — used at boot and login
function syncFromGH(){
  if(!GH.configured()) return Promise.resolve();
  return ghRead().then(function(d){ applyGhData(d); });
}

// Push to GitHub — fire-and-forget after any data change
function syncToGH(){
  if(!GH.configured()) return;
  ghWrite(buildGhData());
}

/* ================================================================
   CRYPTO  — SHA-256 password hashing
================================================================ */
function hashPwd(pwd){
  var data = new TextEncoder().encode(pwd+':gc-salt-2025');
  return crypto.subtle.digest('SHA-256',data).then(function(buf){
    return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
  });
}

/* ================================================================
   HTML ESCAPE
================================================================ */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ================================================================
   APP STATE
================================================================ */
var S = {
  screen:'boot',
  user:null,
  scores:{},
  customGames:[],
  boardGameId:null
};

function allGames(){ return BUILT_IN_GAMES.concat(S.customGames); }

function loadScores(){
  var games=allGames(), s={};
  games.forEach(function(g){
    var raw=gsGet('gc:scores:'+g.id)||[];
    s[g.id]=raw.sort(function(a,b){return b.score-a.score;}).slice(0,5);
  });
  S.scores=s;
}

function submitScore(gameId,pts){
  var raw=gsGet('gc:scores:'+gameId)||[];
  var entry={email:S.user.email,displayName:S.user.displayName,score:pts,date:Date.now()};
  var updated=raw.concat([entry]);
  gsSet('gc:scores:'+gameId,updated);
  var top5=updated.sort(function(a,b){return b.score-a.score;}).slice(0,5);
  var rank=-1;
  top5.forEach(function(s,i){ if(s.email===S.user.email&&s.score===pts) rank=i+1; });
  S.scores[gameId]=top5;
  syncToGH();
  return {top5:top5,rank:rank};
}

/* ================================================================
   INVITE LINK  — encode/decode invite data in URL so cross-browser
================================================================ */
function checkInviteParam(){
  try {
    var params=new URLSearchParams(window.location.search);
    var raw=params.get('gc_invite');
    if(!raw) return;
    var payload=JSON.parse(atob(raw));
    // Support both old format (just invite obj) and new format ({inv, gh})
    var inv=payload.inv||payload;
    if(!inv||!inv.email) return;
    // Seed GitHub config if included
    if(payload.gh&&payload.gh.token) GH.save(payload.gh.owner,payload.gh.repo,payload.gh.token);
    // Seed invite into localStorage
    var existing=gsGet('gc:invites')||[];
    var found=existing.find(function(i){return i.email===inv.email&&i.status==='pending';});
    if(!found) gsSet('gc:invites',existing.concat([inv]));
    window.history.replaceState({},'',window.location.pathname);
  } catch(e){}
}

function makeInviteLink(invObj){
  var payload={inv:invObj};
  if(GH.configured()) payload.gh={owner:GH.owner,repo:GH.repo,token:GH.token};
  var base=window.location.origin+window.location.pathname;
  return base+'?gc_invite='+btoa(JSON.stringify(payload));
}

/* ================================================================
   ROUTER
================================================================ */
function go(screen,extra){
  S.screen=screen;
  if(extra){ Object.keys(extra).forEach(function(k){ S[k]=extra[k]; }); }
  render();
}

function render(){
  var app=document.getElementById('app');
  if(!app) return;
  switch(S.screen){
    case 'boot':   renderBoot(app);   break;
    case 'login':  renderLogin(app);  break;
    case 'hub':    renderHub(app);    break;
    case 'board':  renderBoard(app);  break;
    case 'invite': renderInvite(app); break;
    case 'upload': renderUpload(app); break;
    case 'admin':  renderAdmin(app);  break;
    default:       renderBoot(app);
  }
}

/* ================================================================
   SCREEN: BOOT
================================================================ */
function renderBoot(app){
  app.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px">'
    +'<div class="logo-font" style="font-size:22px;font-weight:900;color:#a78bfa">GAME CENTER</div>'
    +'<div class="spinner"></div>'
    +'<div id="boot-status" style="font-size:12px;color:rgba(255,255,255,.3);margin-top:4px">Starting...</div>'
    +'</div>';
  setTimeout(function(){
    checkInviteParam();
    var status=document.getElementById('boot-status');
    if(status) status.textContent=GH.configured()?'Syncing with GitHub...':'Loading...';
    syncFromGH().then(function(){
      S.customGames=gsGet('gc:custom-games')||[];
      var email=localStorage.getItem('gc:me');
      var users=gsGet('gc:users')||[];
      if(email){
        var u=users.find(function(x){return x.email===email;});
        if(u){ S.user=u; loadScores(); go('hub'); return; }
      }
      go('login');
    });
  },300);
}

/* ================================================================
   SCREEN: LOGIN  (step: email | password | create)
================================================================ */
var LS={step:'email',email:'',err:''};

function renderLogin(app){
  var rings='<div style="position:fixed;inset:0;overflow:hidden;pointer-events:none">'
    +[0,1,2,3,4].map(function(i){
      return '<div style="position:absolute;border-radius:50%;width:'+(280+i*80)+'px;height:'+(280+i*80)+'px;'
        +'border:1px solid rgba(109,40,217,'+(.04+i*.01)+');top:50%;left:50%;transform:translate(-50%,-50%)"></div>';
    }).join('')+'</div>';

  var inner='';
  if(LS.step==='email'){
    inner='<p style="margin:0 0 12px;color:rgba(255,255,255,.45);font-size:13px">Enter your Gmail address to continue</p>'
      +'<input class="inp" id="li-email" type="email" placeholder="you@gmail.com" autocomplete="email" style="margin-bottom:12px" value="'+esc(LS.email)+'">'
      +(LS.err?'<p class="err-msg">'+esc(LS.err)+'</p>':'')
      +'<button class="btn btn-purple btn-full" id="li-next" style="padding:14px;font-size:15px">CONTINUE &#8594;</button>';
  } else if(LS.step==='password'){
    inner='<button id="li-back" style="background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:13px;padding:0;margin-bottom:14px;font-family:Syne,sans-serif">&#8592; '+esc(LS.email)+'</button>'
      +'<p style="margin:0 0 12px;color:rgba(255,255,255,.45);font-size:13px">Enter your password</p>'
      +'<input class="inp" id="li-pwd" type="password" placeholder="Password" autocomplete="current-password" style="margin-bottom:12px">'
      +(LS.err?'<p class="err-msg">'+esc(LS.err)+'</p>':'')
      +'<button class="btn btn-purple btn-full" id="li-signin" style="padding:14px;font-size:15px">SIGN IN &#8594;</button>';
  } else {
    var isFounder=(LS.email===FOUNDER_EMAIL);
    inner='<button id="li-back" style="background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:13px;padding:0;margin-bottom:14px;font-family:Syne,sans-serif">&#8592; '+esc(LS.email)+'</button>'
      +'<p style="margin:0 0 4px;font-size:15px;font-weight:600">Welcome! &#127881;</p>'
      +'<p style="margin:0 0 14px;color:rgba(255,255,255,.4);font-size:13px">'+(isFounder?"You're the founding member. Create your password.":"You've been invited! Create your password.")+'</p>'
      +'<input class="inp" id="li-pwd" type="password" placeholder="Create password (min 6 chars)" autocomplete="new-password" style="margin-bottom:10px">'
      +'<input class="inp" id="li-pwd2" type="password" placeholder="Confirm password" autocomplete="new-password" style="margin-bottom:12px">'
      +(LS.err?'<p class="err-msg">'+esc(LS.err)+'</p>':'')
      +'<button class="btn btn-purple btn-full" id="li-create" style="padding:14px;font-size:15px">CREATE &amp; ENTER &#8594;</button>';
  }

  app.innerHTML='<div class="screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at center,#0d0d2a 0%,#07070f 70%)">'
    +rings
    +'<div style="max-width:380px;width:100%;text-align:center;position:relative;z-index:1">'
      +'<div style="font-size:52px;margin-bottom:10px">&#127918;</div>'
      +'<h1 class="logo-font" style="font-size:24px;font-weight:900;margin:0 0 4px;background:linear-gradient(135deg,#a78bfa,#f472b6,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;animation:shimmer 4s linear infinite">GAME CENTER</h1>'
      +'<p style="color:rgba(255,255,255,.3);margin:0 0 28px;font-size:12px;letter-spacing:.06em">INVITE ONLY &middot; COMPETE &middot; WIN</p>'
      +'<div class="card" style="text-align:left">'+inner+'</div>'
    +'</div>'
  +'</div>';

  /* bind events */
  var ei=document.getElementById('li-email');
  if(ei){ ei.focus(); ei.addEventListener('keydown',function(e){if(e.key==='Enter')doEmailNext();}); }
  var backBtn=document.getElementById('li-back');
  if(backBtn) backBtn.addEventListener('click',function(){ LS.step='email'; LS.err=''; renderLogin(document.getElementById('app')); });
  var nextBtn=document.getElementById('li-next');
  if(nextBtn) nextBtn.addEventListener('click',doEmailNext);
  var signinBtn=document.getElementById('li-signin');
  if(signinBtn){
    signinBtn.addEventListener('click',doSignIn);
    var pi=document.getElementById('li-pwd');
    if(pi) pi.addEventListener('keydown',function(e){if(e.key==='Enter')doSignIn();});
  }
  var createBtn=document.getElementById('li-create');
  if(createBtn){
    createBtn.addEventListener('click',doCreate);
    var p2i=document.getElementById('li-pwd2');
    if(p2i) p2i.addEventListener('keydown',function(e){if(e.key==='Enter')doCreate();});
  }
}

function doEmailNext(){
  var el=document.getElementById('li-email');
  var e=(el?el.value:LS.email).trim().toLowerCase();
  LS.email=e;
  if(!e.includes('@gmail.com')){ LS.err='Please enter a valid Gmail address.'; renderLogin(document.getElementById('app')); return; }
  var users=gsGet('gc:users')||[];
  var invites=gsGet('gc:invites')||[];
  if(users.find(function(u){return u.email===e;})){ LS.step='password'; LS.err=''; }
  else if(e===FOUNDER_EMAIL&&users.length===0){ LS.step='create'; LS.err=''; }
  else if(invites.find(function(i){return i.email===e&&i.status==='pending';})){ LS.step='create'; LS.err=''; }
  else{ LS.err='Access denied. This Game Center is invite-only.'; }
  renderLogin(document.getElementById('app'));
}

function doSignIn(){
  var pwdEl=document.getElementById('li-pwd');
  if(!pwdEl) return;
  var pwd=pwdEl.value;
  var users=gsGet('gc:users')||[];
  var u=users.find(function(x){return x.email===LS.email;});
  if(!u){ LS.err='User not found.'; renderLogin(document.getElementById('app')); return; }
  hashPwd(pwd).then(function(hash){
    if(hash!==u.passwordHash){ LS.err='Incorrect password.'; renderLogin(document.getElementById('app')); return; }
    localStorage.setItem('gc:me',u.email);
    S.user=u; S.customGames=gsGet('gc:custom-games')||[]; loadScores();
    LS={step:'email',email:'',err:''};
    go('hub');
  });
}

function doCreate(){
  var pwdEl=document.getElementById('li-pwd'), pwd2El=document.getElementById('li-pwd2');
  if(!pwdEl||!pwd2El) return;
  var pwd=pwdEl.value, pwd2=pwd2El.value;
  if(pwd.length<6){ LS.err='Password must be at least 6 characters.'; renderLogin(document.getElementById('app')); return; }
  if(pwd!==pwd2){ LS.err='Passwords do not match.'; renderLogin(document.getElementById('app')); return; }
  var e=LS.email;
  var users=gsGet('gc:users')||[];
  var invites=gsGet('gc:invites')||[];
  var isFounder=(e===FOUNDER_EMAIL&&users.length===0);
  hashPwd(pwd).then(function(hash){
    var u={email:e,displayName:e.split('@')[0],passwordHash:hash,isAdmin:isFounder,joinedAt:Date.now(),
           invitedBy:isFounder?null:((invites.find(function(i){return i.email===e;})||{}).by||null)};
    var newInvites=invites.map(function(i){return i.email===e?Object.assign({},i,{status:'accepted'}):i;});
    gsSet('gc:users',users.concat([u]));
    gsSet('gc:invites',newInvites);
    localStorage.setItem('gc:me',e);
    S.user=u; S.customGames=gsGet('gc:custom-games')||[]; loadScores();
    syncToGH();
    LS={step:'email',email:'',err:''};
    go('hub');
  });
}

/* ================================================================
   SCREEN: HUB
================================================================ */
function renderHub(app){
  var games=allGames();

  var cards=games.map(function(g){
    var top=(S.scores[g.id]||[])[0];
    var topHtml=top
      ?'<div style="text-align:right;flex-shrink:0;max-width:96px">'
          +'<div style="font-size:9px;color:rgba(255,255,255,.3);font-family:Orbitron,monospace;margin-bottom:2px">&#127942; BEST</div>'
          +'<div class="logo-font" style="font-size:20px;font-weight:700;color:#fbbf24">'+top.score+'</div>'
          +'<div style="font-size:10px;color:rgba(255,255,255,.3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(top.displayName)+'</div>'
        +'</div>'

function doSendInvite(){
  var input=document.getElementById('inv-email');
  var msgEl=document.getElementById('inv-msg');
  if(!input||!msgEl) return;
  var e=input.value.trim().toLowerCase();
  if(!e.endsWith('@gmail.com')){ msgEl.innerHTML='<p class="err-msg">Only Gmail addresses are supported.</p>'; return; }
  var users=gsGet('gc:users')||[];
  var invites=gsGet('gc:invites')||[];
  if(users.find(function(u){return u.email===e;})){ msgEl.innerHTML='<p class="err-msg">Already a member!</p>'; return; }
  if(invites.find(function(i){return i.email===e&&i.status==='pending';})){ msgEl.innerHTML='<p class="err-msg">Already invited!</p>'; return; }
  var inv={email:e,by:S.user.email,byName:S.user.displayName,at:Date.now(),status:'pending'};
  gsSet('gc:invites',invites.concat([inv]));
  input.value='';
  var link=makeInviteLink(inv);
  msgEl.innerHTML='<p class="ok-msg">&#10003; Invite created for '+esc(e)+'!</p>'
    +'<div style="margin-bottom:12px;padding:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;">'
      +'<p style="font-size:11px;color:rgba(255,255,255,.4);margin:0 0 8px;font-family:Orbitron,monospace;letter-spacing:.08em">SHARE THIS LINK WITH '+esc(e).toUpperCase()+'</p>'
      +'<div style="font-size:11px;color:#a78bfa;word-break:break-all;margin-bottom:10px">'+esc(link)+'</div>'
      +'<button id="inv-copy" class="btn btn-ghost btn-full" style="padding:9px;font-size:12px">&#128203; Copy Link</button>'
    +'</div>';
  var copyBtn=document.getElementById('inv-copy');
  if(copyBtn) copyBtn.addEventListener('click',function(){
    navigator.clipboard.writeText(link).then(function(){
      copyBtn.textContent='&#10003; Copied!'; copyBtn.style.color='#4ade80';
    }).catch(function(){ copyBtn.textContent='Copy failed — select link above'; });
  });
  setTimeout(function(){ go('invite'); },8000);
}

function processUpload(file){
  var statusEl=document.getElementById('upl-status');
  if(!statusEl) return;
  if(!file.name.endsWith('.html')){
    statusEl.innerHTML='<div style="padding:12px 16px;border-radius:11px;margin-bottom:18px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:#f87171;font-size:13px">&#10060; Only .html files are supported.</div>';
    return;
  }
  var reader=new FileReader();
  reader.onload=function(ev){
    var html=ev.target.result;
    var parser=new DOMParser();
    var doc=parser.parseFromString(html,'text/html');
    var name=(doc.querySelector('meta[name="game-name"]')||{}).content||file.name.replace('.html','');
    var emoji=(doc.querySelector('meta[name="game-emoji"]')||{}).content||'\uD83C\uDFAE';
    var description=(doc.querySelector('meta[name="game-description"]')||{}).content||'A custom game';
    var id='custom-'+name.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').slice(0,30)+'-'+Date.now().toString(36);
    var gameData={id:id,name:name,emoji:emoji,description:description,html:html,bg:'linear-gradient(135deg,#0f766e,#0d9488)',accent:'#2dd4bf',builtin:false};
    var existing=gsGet('gc:custom-games')||[];
    var updated=existing.filter(function(g){return g.id!==id;}).concat([gameData]);
    gsSet('gc:custom-games',updated); S.customGames=updated; S.scores[id]=[];
    syncToGH();
    if(statusEl) statusEl.innerHTML='<div style="padding:12px 16px;border-radius:11px;margin-bottom:18px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:#4ade80;font-size:13px">&#10003; "'+esc(name)+'" added to the arcade!</div>';
    setTimeout(function(){ go('upload'); },900);
  };
  reader.readAsText(file);
}

function processRestore(file){
  var msgEl=document.getElementById('adm-restore-msg');
  if(!msgEl) return;
  if(!file.name.endsWith('.json')){ msgEl.innerHTML='<p class="err-msg">Please select a .json archive file.</p>'; return; }
  var reader=new FileReader();
  reader.onload=function(ev){
    try {
      var archive=JSON.parse(ev.target.result);
      if(!archive.data||archive.version<1) throw new Error('Invalid archive format');
      var keys=Object.keys(archive.data);
      keys.forEach(function(k){ gsSet(k,archive.data[k]); });
      // Re-load GH config if it was in the archive
      GH.load();
      var d=archive.data['gc:users']||[];
      var admin=d.find(function(u){return u.email===FOUNDER_EMAIL;});
      if(admin) localStorage.setItem('gc:me',FOUNDER_EMAIL);
      // Push restored data to GitHub
      syncToGH();
      msgEl.innerHTML='<p class="ok-msg">&#10003; Restored '+keys.length+' data sets from '
        +new Date(archive.exportedAt).toLocaleDateString()+'. Reloading...</p>';
      setTimeout(function(){ window.location.reload(); },1800);
    } catch(e){
      msgEl.innerHTML='<p class="err-msg">&#10060; Invalid archive file: '+esc(e.message)+'</p>';
    }
  };
  reader.readAsText(file);
}

================================================================ */
var _currentGame=null, _currentBlobUrl=null;

function launchGame(game){
  _currentGame=game;
  var html=game.builtin?CAT_BLAST_HTML:game.html;
  if(_currentBlobUrl) URL.revokeObjectURL(_currentBlobUrl);
  var blob=new Blob([html],{type:'text/html'});
  _currentBlobUrl=URL.createObjectURL(blob);
  document.getElementById('game-iframe').src=_currentBlobUrl;
  document.getElementById('game-title-bar').textContent=game.emoji+'  '+game.name.toUpperCase();
  document.getElementById('game-overlay').classList.add('active');
}

function closeGameOverlay(){
  document.getElementById('game-overlay').classList.remove('active');
  document.getElementById('score-panel').classList.remove('active');
  document.getElementById('game-iframe').src='about:blank';
  if(_currentBlobUrl){ URL.revokeObjectURL(_currentBlobUrl); _currentBlobUrl=null; }
  _currentGame=null;
  loadScores(); render();
}

document.getElementById('game-back-btn').addEventListener('click',closeGameOverlay);

window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='GAME_OVER'&&_currentGame&&S.user){
    var result=submitScore(_currentGame.id,e.data.score);
    showScorePanel(_currentGame,e.data.score,result.top5,result.rank);
  }
});

function showScorePanel(game,pts,top5,rank){
  var medalText=['\uD83E\uDD47','\uD83E\uDD48','\uD83E\uDD49','4\uFE0F\u20E3','5\uFE0F\u20E3'];
  var rankLabels=['\uD83E\uDD47 #1 on the leaderboard!','\uD83E\uDD48 #2 on the leaderboard!','\uD83E\uDD49 #3 on the leaderboard!','4th place!','5th place!'];
  document.getElementById('sp-emoji').textContent=pts>=500?'\uD83C\uDFC6':pts>=200?'\uD83C\uDF89':'\uD83D\uDCAA';
  document.getElementById('sp-score').textContent=pts;
  var rl=document.getElementById('sp-rank');
  rl.textContent=(rank>0&&rank<=5)?rankLabels[rank-1]:'';
  rl.style.color=game.accent||'#a78bfa';
  document.getElementById('sp-leaderboard').innerHTML=top5.map(function(s,i){
    return '<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:11px">'
      +'<span style="font-size:18px;min-width:26px">'+medalText[i]+'</span>'
      +'<span style="flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(s.displayName)+'</span>'
      +'<span style="font-family:Orbitron,monospace;font-weight:700;color:#fbbf24;font-size:15px">'+s.score+'</span>'
    +'</div>';
  }).join('');
  document.getElementById('score-panel').classList.add('active');
  document.getElementById('sp-back').onclick=function(){ closeGameOverlay(); };
  document.getElementById('sp-again').onclick=function(){ document.getElementById('score-panel').classList.remove('active'); document.getElementById('game-iframe').src=_currentBlobUrl; };
}

'function drawBoard(){var S=CELL*GRID;bx.fillStyle="#150b2e";bx.fillRect(0,0,S,S);bx.strokeStyle="rgba(255,255,255,.035)";bx.lineWidth=1;for(var i=0;i<=GRID;i++){bx.beginPath();bx.moveTo(i*CELL,0);bx.lineTo(i*CELL,S);bx.stroke();bx.beginPath();bx.moveTo(0,i*CELL);bx.lineTo(S,i*CELL);bx.stroke();}for(var r=0;r<GRID;r++)for(var c=0;c<GRID;c++)if(board[r][c]!==null)cat(bx,c*CELL+1,r*CELL+1,board[r][c],CELL-2);if(prev&&drag){prev.cells.forEach(function(p){var pr=p[0],pc=p[1];if(pr>=0&&pr<GRID&&pc>=0&&pc<GRID){bx.fillStyle=prev.valid?"rgba(255,255,255,.22)":"rgba(255,60,60,.18)";bx.beginPath();bx.roundRect(pc*CELL+1,pr*CELL+1,CELL-2,CELL-2,CELL*.1);bx.fill();}});}if(drag){drag.c.forEach(function(d){var dr=d[0],dc=d[1];var px2=dragX+dc*CELL-drag.w*CELL/2;var py2=dragY+dr*CELL-drag.h*CELL*1.1;cat(bx,px2,py2,drag.b,CELL-2);});}}',

'function place(p,row,col){p.c.forEach(function(x){board[row+x[0]][col+x[1]]=p.b;});score+=p.c.length*10;var rc=[],cc=[];for(var r=0;r<GRID;r++)if(board[r].every(function(v){return v!==null;}))rc.push(r);for(var c=0;c<GRID;c++){var full=true;for(var r2=0;r2<GRID;r2++)if(board[r2][c]===null){full=false;break;}if(full)cc.push(c);}var lines=rc.length+cc.length;if(lines>0){rc.forEach(function(r){for(var c=0;c<GRID;c++)board[r][c]=null;});cc.forEach(function(c){for(var r=0;r<GRID;r++)board[r][c]=null;});var bonus=[0,100,250,450,700,1000,1400,1900,2500,3200][Math.min(lines,9)];score+=bonus;}sel.textContent=score;if(score>best){best=score;localStorage.setItem("cb:best",best);bel.textContent=best;}}',
